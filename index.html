<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Stash" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#16413a" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" href="apple-touch-icon.png" />

<meta name="robots" content="noindex" />
<title>Stash</title>
<style>
/* Budget Receipt v2 — clean & modern, dataviz reference tokens.
   Surfaces/ink/status from the validated reference palette. */
:root{
  --page:#f9f9f7; --surface:#fcfcfb;
  --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
  --grid:#e1e0d9; --baseline:#c3c2b7; --ring:rgba(11,11,11,.10);
  --accent:#2a78d6; --accent-soft:#cde2fb; --accent-deep:#1c5cab;
  --good:#0ca30c; --good-text:#006300; --warn:#fab219; --serious:#ec835a; --crit:#d03b3b;
  --neg:#e34948; /* diverging red pole */
  --good-bg:#e3f3e3; --warn-bg:#fdf0d3; --crit-bg:#fae3e3;
  --radius:14px;
}
@media (prefers-color-scheme: dark){
  :root{
    --page:#0d0d0d; --surface:#1a1a19;
    --ink:#ffffff; --ink2:#c3c2b7; --muted:#898781;
    --grid:#2c2c2a; --baseline:#383835; --ring:rgba(255,255,255,.10);
    --accent:#3987e5; --accent-soft:#184f95; --accent-deep:#86b6ef;
    --good-bg:#143318; --warn-bg:#3a2f10; --crit-bg:#3a1717;
    --good-text:#0ca30c; --neg:#e66767;
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--page);color:var(--ink);
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  font-size:16px;line-height:1.45;-webkit-text-size-adjust:100%}
button,input,select{font-family:inherit;font-size:inherit;color:inherit}
.boot{padding:48px 16px;text-align:center;color:var(--muted)}

.shell{max-width:480px;margin:0 auto;min-height:100vh;padding:0 16px 96px}

/* header: tiny receipt nod + month picker */
.top{display:flex;justify-content:space-between;align-items:center;padding:14px 0 4px}
.logo{font-size:13px;font-weight:700;letter-spacing:.14em;color:var(--ink2)}
.logo .scissor{color:var(--muted);font-weight:400}

h2.screen-title{font-size:22px;font-weight:700;margin:14px 0 2px}
.screen-sub{font-size:14px;color:var(--ink2);margin:0 0 14px}

/* cards */
.card{background:var(--surface);border:1px solid var(--ring);border-radius:var(--radius);
  padding:16px;margin-bottom:12px}
.card h3{margin:0 0 2px;font-size:13px;font-weight:600;color:var(--ink2);letter-spacing:.01em}
.card .sub{font-size:13px;color:var(--muted);margin-top:2px}

/* hero */
.hero-val{font-size:46px;font-weight:700;line-height:1.05;letter-spacing:-.02em;margin:4px 0 2px}
.hero-val.overspent{color:var(--crit)}
.hero-cap{font-size:14px;color:var(--ink2)}
.want-rows{margin-top:12px;border-top:1px solid var(--grid);padding-top:4px}

/* meter (fill = severity, track = light step of same ramp) */
.meter{height:6px;border-radius:4px;background:var(--accent-soft);overflow:hidden;margin:6px 0 2px}
.meter.warn-track{background:var(--warn-bg)}
.meter.crit-track{background:var(--crit-bg)}
.meter > i{display:block;height:100%;border-radius:4px;background:var(--accent)}
.meter.warn-track > i{background:var(--warn)}
.meter.crit-track > i{background:var(--crit)}

/* envelope / list rows */
.row{padding:12px 0;border-top:1px solid var(--grid)}
.row:first-of-type{border-top:none}
.row-line{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.row-name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;min-width:0}
.row-name .ic{font-size:17px}
.row-amt{font-size:15px;font-weight:700;white-space:nowrap}
.row-amt small{font-weight:500;color:var(--muted);font-size:12px}
.row-meta{font-size:12.5px;color:var(--muted);margin-top:2px;display:flex;gap:8px;align-items:center}
.tag{font-size:11.5px;font-weight:700;padding:1px 8px;border-radius:999px}
.tag.over{background:var(--crit-bg);color:var(--crit)}
.tag.close{background:var(--warn-bg);color:#8a5f00}
@media (prefers-color-scheme: dark){ .tag.close{color:var(--warn)} }
.tag.ok{background:var(--good-bg);color:var(--good-text)}

/* stat tiles */
.tiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.tile{background:var(--surface);border:1px solid var(--ring);border-radius:var(--radius);padding:12px}
.tile .t-label{font-size:11.5px;font-weight:600;color:var(--ink2)}
.tile .t-val{font-size:19px;font-weight:700;margin-top:2px;letter-spacing:-.01em}
.tile .t-cap{font-size:11px;color:var(--muted);margin-top:1px}
.t-val.pos{color:var(--good-text)}.t-val.negv{color:var(--crit)}

/* attention list */
.attn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;
  padding:12px 0;border-top:1px solid var(--grid);cursor:pointer}
.attn:first-of-type{border-top:none}
.attn .a-ic{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:15px;flex:0 0 auto}
.attn .a-ic.warn{background:var(--warn-bg)}
.attn .a-ic.crit{background:var(--crit-bg)}
.attn .a-ic.good{background:var(--good-bg)}
.attn .a-tx{flex:1;min-width:0}
.attn .a-title{font-size:14.5px;font-weight:600}
.attn .a-sub{font-size:12.5px;color:var(--muted)}
.attn .chev{color:var(--muted);font-size:18px}

/* afford check */
.afford-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.afford-grid input,.afford-grid select{border:1px solid var(--ring);border-radius:10px;padding:11px 12px;
  background:var(--page);font-size:15px;min-width:0}
.verdict{margin-top:10px;border-radius:10px;padding:10px 12px;font-size:14px;display:flex;gap:9px;align-items:flex-start}
.verdict .v-ic{font-size:16px;line-height:1.3}
.verdict.green{background:var(--good-bg);color:var(--good-text)}
.verdict.amber{background:var(--warn-bg);color:#7a5400}
@media (prefers-color-scheme: dark){ .verdict.amber{color:var(--warn)} }
.verdict.red{background:var(--crit-bg);color:var(--crit)}
.verdict b{display:block;font-size:14px}
.verdict .v-sub{font-size:12.5px;opacity:.85;margin-top:1px}

/* chart */
.chart-wrap{margin-top:8px}
.chart-note{font-size:12px;color:var(--muted);margin-top:6px}

/* transactions */
.seg{display:flex;background:var(--page);border:1px solid var(--ring);border-radius:11px;padding:3px;margin-bottom:12px}
.seg button{flex:1;border:none;background:transparent;padding:8px 4px;border-radius:8px;font-size:13.5px;
  font-weight:600;color:var(--ink2);cursor:pointer}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.09)}
.txrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-top:1px solid var(--grid)}
.txrow:first-of-type{border-top:none}
.txrow .tx-main{flex:1;min-width:0}
.txrow .tx-merch{font-size:14.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.txrow .tx-date{font-size:12px;color:var(--muted)}
.txrow .tx-amt{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
.tx-amt.refund{color:var(--good-text)}
.txrow.uncat{position:relative;padding-left:12px}
.txrow.uncat::before{content:"";position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:2px;background:var(--warn)}
.catpick{border:1px solid var(--ring);border-radius:9px;padding:6px 8px;font-size:12.5px;background:var(--page);
  max-width:128px;color:var(--ink2)}
.uncat .catpick{border-color:var(--warn);color:var(--ink);font-weight:600}

/* add form */
.addbtn{position:fixed;right:max(16px, calc(50% - 224px));bottom:86px;width:54px;height:54px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;font-size:28px;font-weight:400;line-height:1;
  box-shadow:0 4px 14px rgba(0,0,0,.22);cursor:pointer;z-index:30}
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:40}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;background:var(--surface);
  border-radius:18px 18px 0 0;padding:18px 16px calc(20px + env(safe-area-inset-bottom));max-width:480px;margin:0 auto}
.sheet h3{margin:0 0 12px;font-size:17px;font-weight:700;color:var(--ink)}
.sheet .cash-sub{font-size:12.5px;color:var(--muted);line-height:1.45;margin:-6px 0 12px}
.sheet .f-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.sheet input,.sheet select{border:1px solid var(--ring);border-radius:10px;padding:12px;background:var(--page);font-size:15px;min-width:0}
.sheet .full{grid-column:1/-1}
.sheet .save{grid-column:1/-1;background:var(--accent);color:#fff;border:none;border-radius:11px;
  padding:14px;font-size:15.5px;font-weight:700;cursor:pointer}
.sheet .hint{font-size:12.5px;color:var(--muted);margin-top:8px}

/* funds */
.fund-actions{display:flex;gap:8px;margin-top:10px}
.fund-actions input{flex:1;border:1px solid var(--ring);border-radius:10px;padding:10px 12px;background:var(--page);font-size:15px;min-width:0}
.btn{border:none;border-radius:10px;padding:10px 14px;font-size:14px;font-weight:600;cursor:pointer}
.btn.primary{background:var(--accent);color:#fff}
.btn.quiet{background:var(--page);border:1px solid var(--ring);color:var(--ink)}
.btn.danger-quiet{background:var(--page);border:1px solid var(--ring);color:var(--crit)}

/* settings */
.opt{display:flex;gap:10px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--grid);cursor:pointer}
.opt:first-of-type{border-top:none}
.opt input{margin-top:4px}
.opt .o-title{font-size:14.5px;font-weight:600}
.opt .o-sub{font-size:12.5px;color:var(--muted)}
.field{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-top:1px solid var(--grid)}
.field:first-of-type{border-top:none}
.field label{font-size:14.5px;font-weight:600}
.field .f-sub{display:block;font-size:12px;color:var(--muted);font-weight:400}
.field input{width:110px;text-align:right;border:1px solid var(--ring);border-radius:9px;padding:9px 10px;
  background:var(--page);font-size:15px;font-variant-numeric:tabular-nums}
.btn-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.filelabel{display:inline-block}
.selfcheck{font-size:14px;margin-top:8px}
.selfcheck .fails{color:var(--crit);font-size:12.5px;white-space:pre-wrap}

/* bottom tab bar */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:20;background:var(--surface);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--ring)}
.tabbar-inner{max-width:480px;margin:0 auto;display:flex;padding:6px 8px calc(8px + env(safe-area-inset-bottom))}
.tb{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 0 2px;cursor:pointer;color:var(--muted);position:relative}
.tb .tb-ic{font-size:20px;line-height:1}
.tb .tb-label{font-size:10.5px;font-weight:600}
.tb.on{color:var(--accent)}
.tb .dot{position:absolute;top:2px;right:calc(50% - 16px);width:8px;height:8px;border-radius:50%;
  background:var(--warn);border:2px solid var(--surface)}

.empty{padding:28px 8px;text-align:center;color:var(--ink2);font-size:14.5px}
.empty .e-ic{font-size:30px;display:block;margin-bottom:8px}
.footnote{text-align:center;font-size:11.5px;color:var(--muted);padding:14px 0 4px}
.err{white-space:pre-wrap;color:var(--crit);font-size:13px}

/* scan (camera OCR) */
.scanbtn{display:block;text-align:center;border:1.5px dashed var(--accent);color:var(--accent);
  border-radius:11px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:10px;
  background:var(--page)}
.scanbtn.busy{color:var(--ink2);border-color:var(--ring);font-weight:500}
.scanlist{max-height:44vh;overflow:auto;border:1px solid var(--grid);border-radius:11px;padding:2px 10px}
.scanrow{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--grid)}
.scanrow:first-of-type{border-top:none}
.scanrow input[type=checkbox]{width:19px;height:19px;flex:0 0 auto}
.scanrow .s-main{flex:1;min-width:0}
.scanrow .s-label{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scanrow .s-kind{font-size:12px;color:var(--good-text)}
.scanrow .s-amt{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}
.scanrow .pos-amt{color:var(--good-text)}
.sheet{max-height:88vh;overflow:auto}
.save:disabled{opacity:.5}

/* delete + kind toggles */
.delx{border:none;background:var(--page);color:var(--muted);width:30px;height:30px;border-radius:9px;
  font-size:19px;line-height:1;cursor:pointer;flex:0 0 auto;border:1px solid var(--ring)}
.delx.armed{width:auto;padding:0 10px;background:var(--crit);border-color:var(--crit);color:#fff;
  font-size:12.5px;font-weight:700}
.s-controls{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap}
.kindpick{max-width:96px}
.s-amt.ref-amt{color:var(--good-text)}

/* ===== banking-app polish (v15) ===== */
.bankish .card{border:none;border-radius:22px;padding:20px 18px;
  box-shadow:0 1px 2px rgba(0,0,0,.05),0 10px 30px rgba(0,0,0,.05)}
@media (prefers-color-scheme: dark){
  .bankish .card{box-shadow:0 1px 2px rgba(0,0,0,.5),0 10px 30px rgba(0,0,0,.35)}
}
.center{text-align:center}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.bank-hero{text-align:center;padding:26px 0 20px}
.bank-val{font-size:48px;font-weight:800;letter-spacing:-.03em;line-height:1.05;margin:8px 0 4px}
.bank-val.overspent{color:var(--crit)}
.pill-link{border:1px solid var(--ring);background:var(--surface);color:var(--ink2);border-radius:999px;
  padding:6px 16px;font-size:12.5px;font-weight:600;cursor:pointer;margin-top:4px}
.anchor-box{max-width:280px;margin:10px auto 0}
.anchor-box input{width:100%;text-align:center;font-size:20px;font-weight:600;border:1.5px solid var(--ring);
  border-radius:14px;padding:14px;background:var(--surface)}
.anchor-btns{display:flex;gap:8px;justify-content:center;margin-top:10px}
.bankish .hero-val{margin:6px 0 2px}
.ask-input{width:200px;margin:10px auto 2px;display:block;text-align:center;font-size:24px;font-weight:700;
  border:1.5px solid var(--ring);border-radius:14px;padding:12px;background:var(--page)}
.bankish .verdict{text-align:left;margin-top:12px}
.bankish .tile{border:none;border-radius:18px;padding:14px 8px;
  box-shadow:0 1px 2px rgba(0,0,0,.05),0 8px 22px rgba(0,0,0,.04)}
@media (prefers-color-scheme: dark){
  .bankish .tile{box-shadow:0 1px 2px rgba(0,0,0,.5),0 8px 22px rgba(0,0,0,.3)}
}
.bankish .tile .t-label{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.bankish .tile .t-val{font-size:18px;margin-top:4px}
.btn,.save,.addbtn{border-radius:999px}
.sheet .save{border-radius:14px}
.reconcile-q{font-size:14.5px;margin:6px 0 10px}
.perday{font-size:14px;font-weight:600;margin-top:8px}
.pacechip{display:inline-block;margin-top:8px;font-size:12px;font-weight:700;border-radius:999px;
  padding:3px 12px;background:var(--good-bg);color:var(--good-text)}
.pacechip.bad{background:var(--crit-bg);color:var(--crit)}
.goal-eta{font-size:10px;color:var(--muted)}
.backnow{display:block;width:100%;text-align:center;border:none;cursor:pointer;margin:0 0 12px;
  background:var(--warn-bg);color:var(--ink);border-radius:999px;padding:9px 14px;
  font-size:13px;font-weight:600}

/* ===== fintech finish pass (v24) ===== */
.bank-val{font-size:44px;font-weight:750;letter-spacing:-.025em;display:inline-block}
.bank-val .cents{font-size:.52em;font-weight:650;color:var(--ink2);letter-spacing:0}
.bank-val.overspent .cents{color:var(--crit)}
.shell{background-image:linear-gradient(180deg, rgba(42,120,214,.07), rgba(42,120,214,0) 240px)}
@media (prefers-color-scheme: dark){
  .shell{background-image:linear-gradient(180deg, rgba(57,135,229,.12), rgba(57,135,229,0) 240px)}
}
.eyebrow{font-size:10.5px;letter-spacing:.16em}
.hero-val{font-size:38px}
.grabber{width:36px;height:4.5px;border-radius:3px;background:var(--grid);margin:-4px auto 14px}
.btn,.pill-link,.save,.add,.mini,.scanbtn,.backnow,.delx{transition:transform .12s ease, opacity .12s ease}
.btn:active,.pill-link:active,.save:active,.add:active,.mini:active,.scanbtn:active,.backnow:active{transform:scale(.97)}
.addbtn{transition:transform .12s ease}
.addbtn:active{transform:scale(.9)}
.tb{transition:color .15s ease}
.tb .tb-ic{display:flex;align-items:center;justify-content:center;height:24px}
.delx{width:36px;height:36px;font-size:20px}
.tile{transition:transform .12s ease}
.card{margin-bottom:14px}
.bank-hero{padding:30px 0 22px}

/* ===== Stash pine-teal theme (v27) — fixed dark, left-aligned, mint accent ===== */
:root, :root{
  --page:#0a1614; --surface:#122723;
  --ink:#f2f7f4; --ink2:#bfd6cc; --muted:#7fa093;
  --grid:#1f3a33; --baseline:#28453d; --ring:rgba(255,255,255,.07);
  --accent:#45e0a6; --accent-soft:#123c30; --accent-deep:#8beecb;
  --good:#45e0a6; --good-text:#8beecb;
  --good-bg:#123c30; --warn-bg:#3a3517; --crit-bg:#3a1d1d;
  --crit:#ff8f8f; --neg:#ff8f8f; --warn:#ffd465;
}
html{background:#0a1614}
body{background:linear-gradient(180deg,#16413a 0px,#10302b 300px,#0a1614 680px) no-repeat #0a1614}
.shell{background-image:none}
.top{padding:calc(20px + env(safe-area-inset-top, 0px)) 0 6px}
.logo{position:relative;display:inline-block;isolation:isolate;font-size:36px;font-weight:800;letter-spacing:-.02em;text-transform:lowercase;color:var(--ink)}
.logo::after{content:".";color:var(--accent)}
.logo-word{position:relative}
.logo-jar{position:absolute;left:50%;top:50%;height:1.5em;width:auto;z-index:-1;
  transform:translate(-45%,-50%) skewX(-8deg);opacity:.34;filter:blur(.3px);pointer-events:none}
.logo-jar rect{fill:var(--accent)}
.bankish .card{background:transparent;box-shadow:none;border-radius:0;padding:6px 0;margin-bottom:26px}
.center{text-align:left}
.bank-hero{text-align:left;padding:14px 0 6px}
.eyebrow{font-size:22px;font-weight:700;color:var(--ink);text-transform:none;letter-spacing:-.01em}
.bank-val{font-size:52px;letter-spacing:-.02em;color:var(--ink)}
.bank-val .cents{color:var(--ink2)}
.hero-val{font-size:40px;color:var(--ink)}
.hero-cap{color:var(--muted);font-size:16px}
.perday{color:var(--ink2);font-size:15px}
.pacechip{background:var(--accent-soft);color:var(--good-text)}
.pacechip.bad{background:var(--crit-bg);color:var(--crit)}
.bankish .tiles{grid-template-columns:1fr 1fr;gap:10px}
.bankish .tile{background:rgba(255,255,255,.05);box-shadow:none;
  border:1px solid rgba(255,255,255,.06);border-radius:22px;
  text-align:left;padding:16px 14px 15px}
.bankish .tile .t-label{color:var(--ink);font-size:14px;font-weight:600;
  text-transform:none;letter-spacing:0}
.bankish .tile .t-val{color:var(--ink);font-size:24px;margin-top:9px}
.bankish .tile .t-cap{color:var(--muted);font-size:12.5px;margin-top:2px}
.goal-eta{color:var(--muted)}
.ask-title{font-size:26px;letter-spacing:-.02em;text-align:center}
.buckets{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 2px;justify-content:center}
.bucket{display:inline-flex;align-items:center;gap:5px;padding:7px 11px;border-radius:999px;
  border:1px solid var(--grid);background:transparent;color:var(--ink2);font-size:13.5px;
  font-weight:600;cursor:pointer}
.bucket .b-ic{font-size:14px}
.bucket.on{background:var(--accent);color:#062018;border-color:var(--accent)}
.statepick{width:100%;padding:12px;border-radius:10px;background:var(--page);
  border:1px solid var(--grid);color:var(--ink);font-size:15px;-webkit-appearance:none;appearance:none}
.taxbox{margin:12px 0 2px;padding:14px;border-radius:16px;background:var(--accent-soft);
  border:1px solid var(--grid)}
.tax-net{font-size:26px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
.tax-net span{font-size:14px;font-weight:600;color:var(--muted);margin-left:6px}
.tax-break{font-size:12.5px;color:var(--ink2);margin-top:6px;line-height:1.5}

/* swipable hero bubbles */
.swiper{margin:8px 0 20px}
.swipe-track{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;gap:0}
.swipe-track::-webkit-scrollbar{display:none}
.swipe-cell{flex:0 0 100%;scroll-snap-align:center;padding:2px 2px}
.bubble{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);
  border-radius:26px;padding:26px 22px 24px;text-align:center;min-height:150px;
  display:flex;flex-direction:column;justify-content:center}
.bubble .bub-label{font-size:15px;font-weight:600;color:var(--muted);margin-bottom:8px}
.bubble .bank-val{font-size:46px;text-align:center}
.bubble .bub-cap{font-size:13px;color:var(--muted);margin-top:8px}
.bubble .perday{margin-top:6px;text-align:center}
.dots{display:flex;justify-content:center;gap:7px;margin-top:12px}
.dot{width:7px;height:7px;border-radius:50%;border:none;padding:0;background:var(--grid);
  cursor:pointer;transition:width .2s ease,background .2s ease}
.dot.on{width:20px;border-radius:4px;background:var(--accent)}

/* static plan line pinned atop Activity's Income list */
.planline{display:flex;justify-content:space-between;align-items:center;
  padding:11px 12px;margin-bottom:8px;border-radius:14px;
  background:var(--accent-soft);border:1px solid var(--grid)}
.planline .pl-name{font-size:13.5px;font-weight:600;color:var(--good-text)}
.planline .pl-amt{font-size:16px;font-weight:800;color:var(--ink)}
.planline .pl-amt small{font-size:11.5px;font-weight:600;color:var(--muted);margin-left:2px}

/* one-row KPI strip */
.tilerow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.minitile{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);
  border-radius:16px;padding:12px 10px;text-align:center}
.minitile .mt-label{font-size:12px;color:var(--muted);font-weight:600}
.minitile .mt-val{font-size:18px;font-weight:800;letter-spacing:-.01em;color:var(--ink);margin-top:4px}
.minitile .meter{height:5px}
.verdict b{font-size:16.5px;letter-spacing:-.01em}
.ask-input{width:100%;margin:12px 0 2px;text-align:center;font-size:24px;background:var(--surface);
  border:1px solid var(--grid);color:var(--ink)}
.meter{background:rgba(255,255,255,.12);height:7px}
.meter > i{background:var(--accent)}
.verdict.green{background:var(--good-bg);color:var(--good-text)}
.verdict.amber{background:var(--warn-bg);color:var(--warn)}
.verdict.red{background:var(--crit-bg);color:var(--crit)}
.seg{background:transparent;border:none;gap:8px}
.seg button{border:1px solid var(--grid);border-radius:999px;color:var(--ink2);padding:9px 4px}
.seg button.on{background:var(--accent);color:#062018;border-color:var(--accent);box-shadow:none}
.rowic{width:44px;height:44px;border-radius:50%;background:var(--surface);border:1px solid var(--grid);
  display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--ink);flex:0 0 auto}
.txrow{border-top-color:var(--grid);padding:13px 0}
.tx-merch{color:var(--ink)}.tx-amt{color:var(--ink)}
.tx-amt.refund,.s-amt.pos-amt{color:var(--good-text)}
.catpick,.recat{background:var(--surface);border-color:var(--grid);color:var(--ink2)}
.tabbar{background:rgba(8,18,16,.94);border-top:1px solid var(--grid)}
.tb{color:var(--muted)} .tb.on{color:var(--accent)}
.addbtn{background:linear-gradient(135deg,#5ceab5 0%,#2fc98f 100%);color:#062018;
  border-radius:20px;box-shadow:0 6px 18px rgba(69,224,166,.28)}
.sheet{background:var(--surface)}
.sheet input,.sheet select,.fund-actions input,.anchor-box input,.field input{
  background:var(--page);border-color:var(--grid);color:var(--ink)}
.sheet .save,.btn.primary{background:var(--accent);color:#062018}
.btn.quiet,.pill-link,.filelabel{background:transparent;border:1px solid var(--grid);color:var(--ink)}
.btn.danger-quiet{background:transparent;border:1px solid var(--grid);color:var(--crit)}
.scanbtn{border-color:var(--accent);color:var(--accent);background:transparent}
.backnow{background:var(--surface);color:var(--ink2);border:1px solid var(--grid)}
.grabber{background:var(--grid)}
.delx{background:var(--surface);border-color:var(--grid);color:var(--muted)}
.delx.armed{background:var(--crit);border-color:var(--crit);color:#210b0b}
.card h3{color:var(--ink)} .card .sub{color:var(--muted)}
.opt .o-title{color:var(--ink)} .opt .o-sub{color:var(--muted)}
.field label{color:var(--ink)} .field .f-sub{color:var(--muted)}
.selfcheck .tag.ok{background:var(--good-bg);color:var(--good-text)}
.tag.ok{background:var(--good-bg);color:var(--good-text)}
.empty{color:var(--ink2)}
.foot,.footnote{color:var(--muted)}

/* collapsible settings sections */
.card.acc{padding:0;overflow:hidden}
.acc-head{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:transparent;border:none;padding:16px;cursor:pointer;text-align:left;
  font:inherit;color:var(--ink)}
.acc-txt{display:flex;flex-direction:column;gap:3px;min-width:0}
.acc-title{font-size:16px;font-weight:700;letter-spacing:-.01em;color:var(--ink)}
.acc-cap{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acc-chev{color:var(--muted);flex:0 0 auto;transition:transform .18s ease}
.acc.open > .acc-head .acc-chev{transform:rotate(180deg)}
.acc.open .acc-head{padding-bottom:8px}
.acc-body{padding:0 16px 16px}
.acc-body .hint{font-size:12.5px;color:var(--muted);margin-top:10px}
/* nested dropdowns (groups inside a group) */
.acc .acc{background:transparent;border:none;border-radius:0;margin-bottom:0;
  border-top:1px solid var(--grid);overflow:visible}
.acc .acc .acc-head{padding:13px 2px}
.acc .acc.open .acc-head{padding-bottom:6px}
.acc .acc .acc-body{padding:0 2px 14px}
.acc .acc .acc-title{font-size:15px}

/* ===== interactive polish (v41): animated numbers + live decider ===== */
.bank-val,.mt-val{font-variant-numeric:tabular-nums}
.meter > i{transition:width .28s cubic-bezier(.22,.61,.36,1)}
.verdict{transition:background-color .3s ease,color .3s ease;animation:verdict-in .32s cubic-bezier(.22,.61,.36,1)}
@keyframes verdict-in{from{opacity:0;transform:translateY(6px) scale(.98)}to{opacity:1;transform:none}}
.impact{margin-top:12px}
.impact .impact-cap{font-size:12.5px;color:var(--muted);margin-top:6px;text-align:center}
.quickrow{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin:10px 0 2px}
.quickamt{border:1px solid var(--grid);background:transparent;color:var(--ink2);border-radius:999px;
  padding:6px 14px;font-size:13.5px;font-weight:600;cursor:pointer;transition:transform .12s ease}
.quickamt:active{transform:scale(.96)}
/* undo toast (sits just above the tab bar) */
.undo-toast{position:fixed;left:16px;right:16px;bottom:calc(74px + env(safe-area-inset-bottom));
  max-width:448px;margin:0 auto;z-index:35;display:flex;align-items:center;justify-content:space-between;
  gap:12px;background:var(--surface);border:1px solid var(--grid);border-radius:14px;
  padding:12px 14px;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:toast-in .22s ease}
@keyframes toast-in{from{transform:translateY(12px);opacity:0}to{transform:none;opacity:1}}
.undo-msg{font-size:14px;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.undo-btn{flex:0 0 auto;background:transparent;border:none;color:var(--accent);font-size:14px;
  font-weight:800;letter-spacing:.02em;cursor:pointer;padding:4px 6px}
@media (prefers-reduced-motion: reduce){ .undo-toast{animation:none} }
/* spend row with inline category on its own line */
.txrow-2line{flex-direction:column;align-items:stretch;gap:8px}
.txrow-2line .txrow-line{display:flex;align-items:center;gap:10px}
.txrow-2line .tx-date{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txrow-2line .catpick{max-width:none;width:100%}
/* Activity search + sort bar */
.actbar{display:flex;gap:8px;margin-bottom:12px}
.actsearch{flex:1;min-width:0;border:1px solid var(--grid);border-radius:11px;padding:10px 12px;
  background:var(--surface);color:var(--ink);font-size:14px;-webkit-appearance:none;appearance:none}
.actsearch::placeholder{color:var(--muted)}
.actsort{border:1px solid var(--grid);border-radius:11px;padding:10px 12px;background:var(--surface);
  color:var(--ink2);font-size:13.5px;font-weight:600;-webkit-appearance:none;appearance:none}
.logit{display:block;width:100%;margin-top:10px;background:transparent;border:1px solid var(--grid);
  color:var(--ink2);border-radius:999px;padding:10px 14px;font-size:13.5px;font-weight:600;cursor:pointer}
.logit-row{display:flex;gap:8px;margin-top:10px}
.logit-row .logit{margin-top:0;flex:1}
.logit.stash{border-color:rgba(69,224,166,.45);color:var(--accent)}
@media (prefers-reduced-motion: reduce){
  .meter > i,.verdict,.quickamt{transition:none;animation:none}
}

/* value-change pulse */
.val-pulse{animation:val-pulse .6s cubic-bezier(.22,.61,.36,1)}
@keyframes val-pulse{0%{transform:scale(1)}30%{transform:scale(1.045)}100%{transform:scale(1)}}

/* meters grow in from empty on mount */
.meter > i{transform-origin:left;animation:meter-in .6s cubic-bezier(.22,.61,.36,1)}
@keyframes meter-in{from{transform:scaleX(0)}to{transform:scaleX(1)}}

/* swipe-to-delete rows */
.swipe-wrap{position:relative;overflow:hidden;touch-action:pan-y;border-top:1px solid var(--grid)}
.swipe-wrap:first-of-type{border-top:none}
.swipe-wrap > .txrow{border-top:none}
.swipe-under{position:absolute;top:6px;bottom:6px;right:0;display:flex;align-items:center;
  justify-content:flex-end;overflow:hidden;border-radius:12px;background:var(--crit-bg)}
.swipe-under button{background:var(--crit);color:#210b0b;border:none;border-radius:10px;
  padding:9px 14px;font-size:12.5px;font-weight:700;cursor:pointer;margin:0 6px;white-space:nowrap}

/* sheets: slide up on open, draggable grab zone */
.sheet{animation:sheet-in .3s cubic-bezier(.22,.61,.36,1)}
@keyframes sheet-in{from{transform:translateY(48px);opacity:.5}to{transform:none;opacity:1}}
.sheet-bg{animation:fade-in .25s ease}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
.grab-zone{touch-action:none;cursor:grab;padding:14px 0 8px;margin:-18px 0 -6px}
.grab-zone .grabber{margin:0 auto}

/* FAB speed-dial (long-press) */
.fan-bg{position:fixed;inset:0;z-index:29}
.fan{position:fixed;right:max(16px, calc(50% - 224px));bottom:152px;display:flex;
  flex-direction:column;gap:9px;align-items:flex-end;z-index:30}
.fan-item{display:flex;align-items:center;gap:8px;border:1px solid var(--grid);border-radius:999px;
  padding:11px 16px;font-size:14px;font-weight:700;background:var(--surface);color:var(--ink);
  box-shadow:0 6px 18px rgba(0,0,0,.35);cursor:pointer;animation:fan-in .2s cubic-bezier(.22,.61,.36,1) both}
@keyframes fan-in{from{opacity:0;transform:translateY(8px) scale(.95)}to{opacity:1;transform:none}}

/* tab change transition */
.tab-pane{animation:pane-in .22s ease both}
@keyframes pane-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Stash-or-spend is the hero: first under the logo, enclosed mint-tinted
   card, larger type. The balance bubbles become context below it. */
.bankish{display:flex;flex-direction:column}
.bankish .ask-card{order:-1;background:rgba(255,255,255,.05);
  border:1px solid rgba(69,224,166,.22);border-radius:26px;
  padding:24px 18px 20px;margin:6px 0 22px}
.ask-card .ask-title{font-size:30px}
.ask-card .ask-input{font-size:30px;padding:14px;border:1.5px solid rgba(69,224,166,.35)}
.ask-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(69,224,166,.15)}
.bankish .swiper{margin-top:0}
/* pocket treatment: the decider card IS the stash pocket — inset stitching,
   emblem + wink; card rides at thumb level now that it's home's only card */
.bankish .ask-card{margin-top:min(10vh, 92px);position:relative;transition:margin-top .25s ease}
.bankish .ask-card.open{margin-top:min(3vh, 28px)}
.ask-card .ask-input{text-align:center;appearance:none;-webkit-appearance:none}
/* money mask: $ prefix and ghost .00 are static; the input auto-sizes to
   its digits; once '.' is typed the remaining cents ghost fades back */
.ask-wrap{display:flex;align-items:baseline;justify-content:center;background:var(--surface);
  border:1.5px solid rgba(69,224,166,.35);border-radius:14px;padding:14px;margin:12px 0 2px;cursor:text}
.ask-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(69,224,166,.15)}
.ask-wrap .ask-input{width:auto;background:none;border:none;padding:0;margin:0;font-size:30px;
  font-weight:700;color:var(--ink);text-align:left;font-variant-numeric:tabular-nums;outline:none;box-shadow:none}
.ask-ghost{font-size:30px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums;
  transition:opacity .25s ease;user-select:none}
.ask-ghost.faded{opacity:.35}
/* tagline types on, then winks; pocket flies in */
.ty{opacity:0;animation:ty-in .3s ease both}
@keyframes ty-in{to{opacity:1}}
.wink{opacity:0;display:inline-block;transform-origin:center;margin-left:.4em;
  animation:ty-in .25s ease both, wink-squish .5s ease both}
@keyframes wink-squish{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.15)}}
.pocket-brand svg{animation:pocket-in .55s cubic-bezier(.34,1.56,.64,1) both}
@keyframes pocket-in{from{transform:translateY(14px) scale(.6);opacity:0}to{transform:none;opacity:1}}
/* static wordmark: "Stash or spend?" — two-tone, one-time entrance, verdict emphasis */
.ask-title{line-height:1.15}
.wordmark{display:inline-flex;align-items:baseline;justify-content:center;white-space:nowrap}
.wm-stash,.wm-spend,.wm-or,.wm-q{display:inline-block;transition:color .35s ease,opacity .35s ease}
.wm-stash{color:var(--accent);animation:wm-inL .5s cubic-bezier(.34,1.4,.5,1) backwards}
.wm-spend{color:var(--ink2);animation:wm-inR .5s cubic-bezier(.34,1.4,.5,1) backwards}
.wm-or{color:var(--muted);font-size:.6em;font-weight:600;margin:0 .34em;letter-spacing:.03em;animation:wm-fade .5s .12s ease both}
.wm-q{color:var(--ink);animation:wm-fade .5s .12s ease both}
@keyframes wm-inL{from{transform:translateX(-8px);opacity:0}to{transform:none;opacity:1}}
@keyframes wm-inR{from{transform:translateX(8px);opacity:0}to{transform:none;opacity:1}}
@keyframes wm-fade{from{opacity:0}to{opacity:1}}
.wm-stash.wm-win,.wm-spend.wm-win{color:var(--accent);animation:wm-pop .45s cubic-bezier(.34,1.56,.64,1)}
.wm-stash.wm-dim,.wm-spend.wm-dim{color:var(--muted);opacity:.5}
@keyframes wm-pop{0%{transform:scale(1)}42%{transform:scale(1.13)}100%{transform:scale(1)}}
/* your-call coin flip (AMBER verdict) */
.stage-wrap.coin{width:50px;height:50px}
.anim-coin{position:absolute;left:0;top:0;will-change:transform;
  animation:coin-flip 1s cubic-bezier(.34,1.2,.5,1) both}
/* toss up + in-plane spin: never goes edge-on (no vanish) and lands upright
   (ends on a 360deg multiple) — no mirrored backface */
@keyframes coin-flip{
  0%{transform:translateY(0) scale(.5) rotate(0);opacity:0}
  25%{opacity:1}
  55%{transform:translateY(-16px) scale(1.08) rotate(380deg)}
  100%{transform:translateY(0) scale(1) rotate(720deg);opacity:1}}
.til-pay{font-size:13px;color:var(--ink2);text-align:center;margin:8px 0 2px}
.til-pay b{color:var(--ink);font-weight:700}
.til-day{color:var(--muted)}
.ask-help{font-size:13px;color:var(--ink2);text-align:left;background:rgba(255,255,255,.04);
  border:1px solid var(--grid);border-radius:12px;padding:10px 12px;margin:10px 0 2px;line-height:1.5}
.ask-title{position:relative}
.info-i{background:none;border:1px solid var(--grid);color:var(--muted);border-radius:50%;
  width:22px;height:22px;font-size:12px;line-height:1;cursor:pointer;
  position:absolute;right:0;top:50%;transform:translateY(-50%)}
.ask-card::before{content:"";position:absolute;inset:7px;border:1.5px dashed rgba(69,224,166,.26);
  border-radius:20px;pointer-events:none}
.pocket-brand{display:flex;flex-direction:column;align-items:center;gap:7px;margin-top:18px}
.pocket-tag{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.02em}
/* verdict theater: bill tucks into the pocket on Stash, card swipes on Spend.
   Movers are HTML divs (composited), statics sit in front — no SVG-group
   transforms (iOS won't composite those, which caused jitter). */
.verdict-stage{display:flex;justify-content:center;margin:4px 0 2px;min-height:52px;overflow:hidden}
.stage-wrap{position:relative;width:84px;height:46px}
.stage-wrap.stash{width:60px;height:52px}
.stage-front{position:absolute;left:0;top:0;z-index:1;pointer-events:none}
.anim-bill{position:absolute;left:0;top:0;z-index:0;will-change:transform;
  animation:bill-drop 1.05s cubic-bezier(.45,0,.35,1) both}
@keyframes bill-drop{0%{transform:translate3d(0,-20px,0);opacity:0}25%{opacity:1}
  60%{transform:translate3d(0,0,0)}80%{transform:translate3d(0,3px,0)}100%{transform:translate3d(0,3px,0)}}
.anim-card{position:absolute;left:0;top:0;z-index:0;will-change:transform;
  animation:card-swipe 1.15s cubic-bezier(.5,0,.35,1) both}
@keyframes card-swipe{0%{transform:translate3d(-30px,0,0) rotate(-4deg);opacity:0}18%{opacity:1}
  78%{transform:translate3d(30px,0,0) rotate(-4deg);opacity:1}100%{transform:translate3d(36px,0,0) rotate(-4deg);opacity:0}}
/* impact bar: scale, never width — width animates layout and stutters */
.impact .meter > i{width:100%;transform-origin:left;transition:transform .25s ease;animation:none}
.verdict{animation:verdict-pop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes verdict-pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.ask-card .verdict{border-radius:16px;padding:13px 14px}
.ask-card .verdict b{font-size:18px;letter-spacing:-.01em}

/* chart bars grow from the zero line */
.nc-bar{animation:bar-in .5s cubic-bezier(.22,.61,.36,1) both}
@keyframes bar-in{from{transform:scaleY(0)}to{transform:scaleY(1)}}

/* savings jars: liquid rises as you save, drains as you spend */
.jar-liq{transition:transform .7s cubic-bezier(.22,.61,.36,1)}
.jarrow{display:flex;align-items:center;justify-content:center;gap:9px;margin-top:6px}
.tilerow.jar-center{grid-template-columns:1fr auto 1fr;align-items:stretch;gap:10px}
.tilerow.jar-center > svg{align-self:center}
.tilerow.jar-center .minitile{display:flex;flex-direction:column;justify-content:center}
.jarhero{display:flex;align-items:center;justify-content:center;gap:12px}

/* hero bubbles: active card has depth, neighbors recede */
.swipe-cell .bubble{transition:transform .35s cubic-bezier(.22,.61,.36,1),opacity .35s ease;
  transform:scale(.94);opacity:.55}
.swipe-cell.cur .bubble{transform:none;opacity:1}

@media (prefers-reduced-motion: reduce){
  .val-pulse,.meter > i,.sheet,.sheet-bg,.fan-item,.tab-pane,.nc-bar,.anim-bill,.anim-card,.verdict,.pocket-brand svg,.anim-coin{animation:none}
  .ty,.wink{animation:none;opacity:1}
  .wm-stash,.wm-spend,.wm-or,.wm-q{animation:none;transform:none;opacity:1}
  .wm-stash.wm-win,.wm-spend.wm-win{animation:none;transform:none}
  .swipe-cell .bubble{transition:none;transform:none;opacity:1}
  .jar-liq{transition:none}
}

</style>

<script>/* domain core — integer-cents money math */
/* =====================================================================
   Personal Budget Tracker & Calculator — CORE DOMAIN LOGIC
   ---------------------------------------------------------------------
   Single source of truth for money math. Pure functions, integer cents
   in / integer cents out, NO side effects, NO DOM. This same file is
   unit-tested under node AND inlined verbatim into the HTML artifact so
   the shipped app and the tests run identical code.
   Spec refs are noted as (§x.y).
   ===================================================================== */
(function (root) {
  "use strict";

  /* ---------- money (§2.7 integer cents everywhere) ---------- */
  // dollars(number) -> integer cents, via round to kill float error
  function c(dollars) { return Math.round(dollars * 100); }
  // integer cents -> "$1,234.56" (negatives as -$12.00)
  function fmt(cents) {
    var n = (Math.abs(cents) / 100).toLocaleString("en-US", {
      minimumFractionDigits: 2, maximumFractionDigits: 2,
    });
    return (cents < 0 ? "-$" : "$") + n;
  }

  /* ---------- dates (§8 derive Month from LOCAL components) ---------- */
  // ISODate "YYYY-MM-DD" -> Month "YYYY-MM". String slice avoids the
  // UTC toISOString() off-by-one-day trap near midnight.
  function monthOf(iso) { return String(iso).slice(0, 7); }
  function daysInMonth(month) {
    var y = +month.slice(0, 4), m = +month.slice(5, 7);
    return new Date(y, m, 0).getDate(); // day 0 of next month = last day
  }

  /* ---------- selectors (§4.2 derive, never store) ---------- */
  function isSpend(t) { return !t.isTransfer; }

  // total non-transfer outflow for a month (refunds are negative -> reduce)
  function monthSpend(txns, month) {
    return txns.reduce(function (s, t) {
      return (isSpend(t) && monthOf(t.date) === month) ? s + t.amount : s;
    }, 0);
  }
  function monthIncome(income, month) {
    return income.reduce(function (s, e) {
      return monthOf(e.date) === month ? s + e.amount : s;
    }, 0);
  }
  // §4.2 canonical selector
  function spentForEnvelope(txns, month, categoryId) {
    return txns.reduce(function (s, t) {
      return (isSpend(t) && monthOf(t.date) === month && t.categoryId === categoryId)
        ? s + t.amount : s;
    }, 0);
  }
  function uncategorizedTotal(txns, month) {
    return spentForEnvelope(txns, month, null);
  }
  function netForMonth(income, txns, month) {
    return monthIncome(income, month) - monthSpend(txns, month);
  }

  // distinct months that have income or spend, sorted ascending
  function monthsWithData(income, txns) {
    var set = {};
    income.forEach(function (e) { set[monthOf(e.date)] = 1; });
    txns.forEach(function (t) { set[monthOf(t.date)] = 1; });
    return Object.keys(set).sort();
  }
  // trailing N months <= asOfMonth (inclusive), among months present
  function trailingMonths(allMonths, asOfMonth, n) {
    var elig = allMonths.filter(function (m) { return m <= asOfMonth; });
    return elig.slice(Math.max(0, elig.length - n));
  }

  /* ---------- §2.1 / §5 baseline income (the anchor) ---------- */
  // depositsByMonth: array of { month, cents } (already aggregated)
  function trailingAverage(deposits, n) {
    var last = deposits.slice(Math.max(0, deposits.length - n));
    if (!last.length) return 0;
    var sum = last.reduce(function (s, d) { return s + d.cents; }, 0);
    return Math.round(sum / last.length);
  }
  function trailingMin(deposits, n) {
    var last = deposits.slice(Math.max(0, deposits.length - n));
    if (!last.length) return 0;
    return last.reduce(function (m, d) { return Math.min(m, d.cents); }, Infinity);
  }
  // returns { avg3, low, safe, chosen } — safe = the conservative one (§2.1)
  function baselineIncome(deposits, method, manualCents) {
    var avg3 = trailingAverage(deposits, 3);
    var low = Math.round(trailingMin(deposits, 3) * 1.10);
    var safe = Math.min(avg3, low);
    var value;
    if (method === "AVERAGE_3M") value = avg3;
    else if (method === "TRAILING_LOW") value = low;
    else if (method === "MANUAL") value = manualCents || 0;
    else value = safe; // default: more conservative of the two
    return { avg3: avg3, low: low, safe: safe, value: value };
  }

  /* ---------- §2.4 / §5.2 runway & burn (early-warning core) ---------- */
  // coreMonthlyBurn = trailing-3M avg of NEED-class spend
  function coreMonthlyBurn(txns, categories, allMonths, asOfMonth) {
    var needIds = {};
    categories.forEach(function (cat) { if (cat.class === "NEED") needIds[cat.id] = 1; });
    var months = trailingMonths(allMonths, asOfMonth, 3);
    if (!months.length) return 0;
    var total = months.reduce(function (s, m) {
      var perMonth = txns.reduce(function (ss, t) {
        return (isSpend(t) && monthOf(t.date) === m && needIds[t.categoryId])
          ? ss + t.amount : ss;
      }, 0);
      return s + perMonth;
    }, 0);
    return Math.round(total / months.length);
  }
  // returns months of runway as a float; guards divide-by-zero
  function runwayMonths(liquidCushion, coreBurn) {
    if (coreBurn <= 0) return Infinity;
    return liquidCushion / coreBurn;
  }
  // trailing-3M average of TOTAL monthly spending (all non-transfer,
  // non-savings) — your real spending habits, not just needs.
  function spendBurn(txns, categories, allMonths, asOfMonth) {
    var saveIds = {};
    categories.forEach(function (cat) { if (cat.class === "SAVING") saveIds[cat.id] = 1; });
    var months = trailingMonths(allMonths, asOfMonth, 3);
    if (!months.length) return 0;
    var total = months.reduce(function (s, m) {
      return s + txns.reduce(function (ss, t) {
        return (isSpend(t) && monthOf(t.date) === m && !saveIds[t.categoryId]) ? ss + t.amount : ss;
      }, 0);
    }, 0);
    return Math.round(total / months.length);
  }
  // Safety net, in months: how long your liquid cushion (bank + savings)
  // covers your REAL spending if income stopped — trimmed when you're
  // outspending your income (the cushion is already eroding), and pulled
  // toward your months-of-cover goal so an ambitious goal reads stricter.
  // Considers: savings (cushion), spending habits (avgSpend), current
  // earnings (avgIncome), and the savings goal (targetMonths).
  function safetyNetMonths(cushion, avgSpend, avgIncome, targetMonths) {
    if (avgSpend <= 0) return cushion > 0 ? Infinity : 0;
    var m = Math.max(0, cushion) / avgSpend;
    // erosion: if you spend more than you earn, scale runway by the share of
    // spending your income actually covers (never below 35%).
    if (avgIncome > 0 && avgSpend > avgIncome) {
      m *= Math.max(0.35, avgIncome / avgSpend);
    }
    // goal awareness: a bigger months-of-cover goal makes the read a touch
    // more conservative until you've built past it (bounded, never > raw).
    if (targetMonths > 0 && m < targetMonths) {
      m *= 0.5 + 0.5 * (m / targetMonths);
    }
    return m;
  }
  // next payday ISO on/after today, stepping from an anchor payday by the
  // pay schedule. weekly/biweekly step by days; semimonthly ~ every 15 days;
  // monthly keeps the anchor day-of-month. Returns null if no anchor.
  function nextPayday(anchorISO, schedule, todayISO) {
    if (!anchorISO) return null;
    var oneDay = 86400000;
    var today = new Date(todayISO + "T00:00:00");
    var anchor = new Date(anchorISO + "T00:00:00");
    function iso(d) {
      var p = function (n) { return (n < 10 ? "0" : "") + n; };
      return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate());
    }
    if (schedule === "monthly") {
      var day = anchor.getDate();
      var c = new Date(today.getFullYear(), today.getMonth(), day);
      if (c < today) c = new Date(today.getFullYear(), today.getMonth() + 1, day);
      return iso(c);
    }
    var step = schedule === "weekly" ? 7 : schedule === "semimonthly" ? 15 : 14;
    var diffDays = Math.floor((today - anchor) / oneDay);
    var cycles = Math.floor(diffDays / step);
    var next = new Date(anchor.getTime() + cycles * step * oneDay);
    while (next < today) next = new Date(next.getTime() + step * oneDay);
    return iso(next);
  }
  // whole days from today to an ISO date (0 if today or past)
  function daysUntil(iso, todayISO) {
    if (!iso) return null;
    var d = Math.round((new Date(iso + "T00:00:00") - new Date(todayISO + "T00:00:00")) / 86400000);
    return Math.max(0, d);
  }

  /* ---------- §5.6 month-end projector (pace) ---------- */
  // guards daysElapsed == 0 (§5.6/§8)
  function projectSpend(spendMTD, daysElapsed, daysInMo) {
    if (daysElapsed <= 0) return 0;
    return Math.round(spendMTD / daysElapsed * daysInMo);
  }
  // §2.5 deficit flag: projected outstrips income we can reasonably expect
  function isDeficit(projectedSpend, incomeSoFar, expectedRemainingIncome) {
    return projectedSpend > incomeSoFar + (expectedRemainingIncome || 0);
  }
  // For a COMPLETED month we can flag directly on realized net < 0.
  function monthIsRed(income, txns, month) {
    return netForMonth(income, txns, month) < 0;
  }

  /* ---------- §5.1 budget allocator (50/30/20, adjustable) ---------- */
  // Split `pool` cents across items [{id, weight}] proportional to weight,
  // integer cents, remainder assigned deterministically to the largest
  // weight (tie -> first). Guarantees sum(out) === pool. (§7 rounding)
  function splitPool(pool, items) {
    var totalW = items.reduce(function (s, it) { return s + it.weight; }, 0);
    var out = {}, assigned = 0, biggest = null;
    items.forEach(function (it) {
      var share = totalW > 0 ? Math.floor(pool * it.weight / totalW) : 0;
      out[it.id] = share;
      assigned += share;
      if (!biggest || it.weight > biggest.weight) biggest = it;
    });

    if (biggest) out[biggest.id] += remainder;
    return out;
  }
  // ratios: {need, want, save} summing to 1. weightsByCat: {catId: weightCents}
  function allocate(baseline, ratios, categories, weightsByCat) {
    var CLASSES = ["NEED", "WANT", "SAVING"];
    var members = {}, nonEmpty = [];
    CLASSES.forEach(function (cls) {
      members[cls] = categories.filter(function (cat) {
        return cat.class === cls && !cat.archived;
      });
      if (members[cls].length) nonEmpty.push(cls);
    });
    if (!nonEmpty.length) return {};
    var pools = {
      NEED: Math.round(baseline * ratios.need),
      WANT: Math.round(baseline * ratios.want),
      SAVING: Math.round(baseline * ratios.save),
    };
    // a class with no categories must not swallow its pool — reroute it
    CLASSES.forEach(function (cls) {
      if (!members[cls].length && pools[cls] !== 0) {
        pools[nonEmpty[0]] += pools[cls];
        pools[cls] = 0;
      }

    var drift = baseline - CLASSES.reduce(function (s, k) { return s + pools[k]; }, 0);
    pools[nonEmpty[0]] += drift;

    nonEmpty.forEach(function (cls) {
      var items = members[cls].map(function (cat) {
        var w = weightsByCat[cat.id];
        return { id: cat.id, weight: (w == null ? 1 : w) };

      var split = splitPool(pools[cls], items);
      Object.keys(split).forEach(function (k) { result[k] = split[k]; });

  function monthlySetAside(annualEstimate) { return Math.round(annualEstimate / 12); }

  function fundStatus(fund, todayISO) {

      status.monthsUntilDue = mUntilDue;

      status.onTrack = willHave >= fund.targetBalance;
      status.shortfall = Math.max(0, fund.targetBalance - willHave);

        ? Math.ceil(status.remaining / mUntilDue)
        : status.remaining; // due now: the catch-up IS the gap
    }
    return status;
  }

  /* ---------- input hygiene (view edge; keeps NaN out of the ledger) ---------- */
  // "12.34" -> 1234; ""/garbage -> null (caller decides; never NaN cents)
  function parseDollars(str) {
    if (str == null) return null;
    var s = String(str).trim().replace(/[$,]/g, "");

    var n = Math.round(parseFloat(s) * 100);

  }

  /* ---------- §5.5 "can I afford this?" ---------- */
  function canAfford(amount, envelopePlanned, envelopeSpent, cushion, coreBurn, targetRunway) {
    var envelopeAfter = envelopePlanned - envelopeSpent - amount; // remaining
    var runwayBefore = runwayMonths(cushion, coreBurn);
    var runwayAfter = runwayMonths(cushion - amount, coreBurn);
    var fitsEnvelope = envelopeAfter >= 0;
    // RED = this purchase breaks the plan: busts the envelope, or is the
    // thing that pushes runway UNDER target. If runway is already below
    // target, an in-envelope buy is AMBER (the envelope already encodes
    // the conservative budget) — otherwise everything reds out and the
    // signal dies exactly when the user needs it most.
    var crossesTarget = runwayBefore >= targetRunway && runwayAfter < targetRunway;
    var verdict;
    if (!fitsEnvelope || crossesTarget) verdict = "RED";
    else if (runwayAfter < targetRunway) verdict = "AMBER";
    else verdict = "GREEN";
    return {
      fitsEnvelope: fitsEnvelope,
      envelopeAfter: envelopeAfter,
      runwayAfter: runwayAfter,
      verdict: verdict,
    };
  }

  /* ---------- month-end projection (variable spending paced) ----------
     Auto entries (income/bills/savings) land in full on the 1st, so only
     VARIABLE spending gets paced across the month (§8: no scare numbers). */
  function projectMonthEnd(netNow, variableSpendMTD, daysElapsed, daysInMo) {
    if (daysElapsed <= 0) return netNow;
    var daysLeft = Math.max(0, daysInMo - daysElapsed);
    return Math.round(netNow - (variableSpendMTD / daysElapsed) * daysLeft);
  }

  /* ---------- simple-mode verdict: this month + pace + per-day ----------
     RED   'left'  — more than what's left this month.
     RED   'pace'  — the month was on track to end positive and THIS
                     purchase tips the projection below zero.
     AMBER 'mostleft' — fits, but under 20% of what's left would remain.
     AMBER 'trend' — month already trending negative (purchase isn't the
                     cause, so warn, don't block).
     AMBER 'bigday'— costs more than ~3 days of the daily budget.
     GREEN otherwise. projectedEnd/perDay may be null (past months). */
  // leniency: 1 = neutral (discretionary). >1 = essential (food, gas, emergency)
  // — the soft AMBER warnings relax proportionally, but a hard RED (you truly
  // don't have the money / it tips the month negative) always stands.
  // ctx (all optional) unlocks the whole picture the app already knows:
  //   { bank, cushion, burn, targetRunway, daysLeft }
  // Without ctx, behavior is the original month-only model, unchanged.
  //   RED  'bank'    — more than what's in the bank (hardest floor of all).
  //   RED  'cushion' — an EMERGENCY even the safety net can't cover.
  //   AMBER'net'     — emergency the month can't cover, but the net can:
  //                    that's what it's for — route there, don't block.
  //   AMBER'dent'    — a discretionary buy that pushes the safety net below
  //                    its target: wants don't get to quietly spend the net.
  //   AMBER'squeeze' — time-aware "most of what's left": what the DAILY
  //                    budget becomes after this, given the days remaining.
  //   trend is a gradient, not a gate: essentials only hear about a deficit
  //   when the hole is deep relative to their slack.
  function simpleVerdict(amount, leftThisMonth, projectedEnd, perDay, leniency, ctx) {
    var L = (leniency && leniency > 0) ? leniency : 1;
    var x = ctx || {};
    var leftAfter = leftThisMonth - amount;
    var projAfter = projectedEnd == null ? null : projectedEnd - amount;
    var out = { leftAfter: leftAfter, projAfter: projAfter, leniency: L,
      bank: x.bank != null ? x.bank : null, bankAfter: null, netAfter: null, runwayAfter: null, perDayAfter: null };
    var done = function (v, r) { out.verdict = v; out.reason = r; return out; };
    var paceTip = projAfter != null && projectedEnd >= 0 && projAfter < 0;
    // user-set balance floor: never let the bank drop below it (0 = the
    // literal empty-account floor)
    var floor = x.floor > 0 ? x.floor : 0;
    if (x.bank != null) out.bankAfter = x.bank - amount;
    var bankShort = x.bank != null && (x.bank - amount) < floor;
    var isEmergency = L >= 3;
    // §emergency: the this-month lens is the wrong lens. When the month (or
    // the bank) can't cover it, route to the safety net instead of blocking.
    if (isEmergency && x.cushion != null && (bankShort || leftAfter < 0 || paceTip)) {
      if (amount > x.cushion) return done("RED", "cushion");
      out.netAfter = x.cushion - amount;
      out.runwayAfter = x.burn > 0 ? out.netAfter / x.burn : Infinity;
      return done("AMBER", "net");
    }
    // hard limits never bend
    if (bankShort) return done("RED", "bank");
    if (leftAfter < 0) return done("RED", "left");
    if (paceTip) return done("RED", "pace");
    // wants crossing under the runway target warn even when the month is fine
    if (L <= 1 && x.cushion != null && x.burn > 0 && x.targetRunway > 0) {
      var rb = x.cushion / x.burn, ra = (x.cushion - amount) / x.burn;
      if (rb >= x.targetRunway && ra < x.targetRunway) {
        out.runwayAfter = ra;
        return done("AMBER", "dent");
      }
    }
    // discretionary restraint: a want that eats a big slice of your spendable
    // cash earns a "your call", even when the month math allows it. Fun (0.7)
    // trips sooner than General (0.9); needs (L>=1) skip this entirely. Not a
    // block — just a nudge to sit with a large discretionary buy.
    if (L < 1 && x.bank != null) {
      var spendable = x.bank - floor;
      if (spendable > 0 && amount > spendable * 0.33 * L) return done("AMBER", "want");
    }
    // future outlook: the month can look fine while the BANK slips under
    // what next month's bills need — warn before the float breaks
    if (!isEmergency && x.bank != null && x.billsMonthly > 0 && x.bank - amount < x.billsMonthly) {
      out.bankAfter = x.bank - amount;
      return done("AMBER", "float");
    }
    // soft warnings: time-aware when daysLeft is known, original rules if not
    var hasDays = x.daysLeft >= 1 && perDay != null && perDay > 0;
    if (hasDays) {
      out.perDayAfter = Math.floor(leftAfter / x.daysLeft);
      if (out.perDayAfter < perDay * (0.5 / L)) return done("AMBER", "squeeze");
    } else if (leftThisMonth > 0 && leftAfter < leftThisMonth * (0.2 / L)) {
      return done("AMBER", "mostleft");
    }
    if (projectedEnd != null && projectedEnd < Math.min(0, -((perDay || 0) * 3 * (L - 1)))) {
      return done("AMBER", "trend");
    }
    if (!hasDays && perDay != null && perDay > 0 && amount > perDay * 3 * L) {
      return done("AMBER", "bigday");
    }
    return done("GREEN", "ok");
  }

  // spending buckets shown in the "Stash or spend?" picker, with how lenient
  // each is. Essentials you can't easily skip get more slack.
  var SPEND_BUCKETS = [
    { id: "emergency", label: "Emergency", icon: "🚑", leniency: 3 },
    { id: "food",      label: "Food",      icon: "🍎", leniency: 2 },
    { id: "gas",       label: "Gas",       icon: "⛽", leniency: 2 },
    { id: "bills",     label: "Bills",     icon: "🧾", leniency: 1.5 },
    { id: "general",   label: "General",   icon: "🛒", leniency: 0.9 },

  }

  /* ---------- §5.7 minimum-income / break-even ---------- */
  function minIncomeNeeded(envelopes, categories, sinkingFunds) {
    var byId = {}; categories.forEach(function (cat) { byId[cat.id] = cat; });
    var needs = envelopes.reduce(function (s, e) {

<script>/* storage adapter — localStorage with in-memory fallback + .bak */
/* Storage adapter — HTML artifact target.
   Tries localStorage (works when opened as a normal file/page); degrades
   to in-memory if the host blocks it (some sandboxed iframes do), exactly
   the mem-fallback the spec requires (§4.4). Corrupt blob -> snapshot to
   .bak, start from seed, tell the user (§8). One key, batched writes. */
(function (root) {
  "use strict";
  var KEY = "budget:v2:data";
  var MEM_LABEL = "memory only — use Export to keep data";
  var mem = null;
  var backend = null, label = MEM_LABEL;
  try {
    var t = "__budget_probe__";
    root.localStorage.setItem(t, "1");
    root.localStorage.removeItem(t);
    backend = root.localStorage;
    label = "saved in this browser";
  } catch (e) { backend = null; }

  var corrupted = false, saveFailed = false;
  // A write can start failing after boot (quota exceeded, private mode). When
  // it does we must fall over to the in-memory backend so that load() reads
  // the same place save() writes — otherwise the write is silently lost AND
  // the next load reads a stale localStorage blob. We also downgrade the
  // label so the footer stops promising "saved in this browser".
  function degradeToMemory(data) {
    backend = null;
    mem = data;
    saveFailed = true;
    label = MEM_LABEL;
  }
  root.BudgetStorage = {
    get label() { return label; },
    get corrupted() { return corrupted; },
    get saveFailed() { return saveFailed; },
    load: function () {
      return new Promise(function (resolve) {
        if (!backend) return resolve(mem);
        var raw = null;
        try { raw = backend.getItem(KEY); } catch (e) { return resolve(mem); }
        if (raw == null) return resolve(mem);
        try {
          resolve(JSON.parse(raw));
        } catch (e) {
          // never destroy: snapshot the unreadable blob, then fall back
          try { backend.setItem(KEY + ".bak", raw); } catch (e2) {}
          corrupted = true;
          resolve(null);
        }
      });
    },
    save: function (data) {
      // keep the latest in memory regardless, so a later read is never stale
      mem = data;
      if (!backend) return;
      try {
        backend.setItem(KEY, JSON.stringify(data));
      } catch (e) {
        degradeToMemory(data);
      }
    },
  };
})(typeof globalThis !== "undefined" ? globalThis : (typeof self !== "undefined" ? self : this));

<script>/* encrypted multi-device sync (merge + crypto + transport) */
/* =====================================================================
   SYNC — encrypted multi-device sync through the user's own private
   GitHub repo. Design rules:
     · End-to-end encrypted: AES-GCM with a key derived (PBKDF2) from a
       passphrase that never leaves the device. GitHub stores ciphertext.
     · Merge, don't clobber: transactions/income union by id, deletions
       carried as tombstones so a delete on one device sticks everywhere.
     · Sync config (token/passphrase) lives in ITS OWN storage key and is
       never part of the exported/synced data blob.
   mergeData is pure and unit-tested; crypto + transport are thin.
   ===================================================================== */
(function (root) {
  "use strict";

  /* ---------------- merge (pure) ---------------- */
  // Union two record lists by id. When BOTH sides have the same id (an
  // edited record), the copy with the higher per-record `_m` (modified-at)
  // wins; records without `_m` tie, and ties keep the newer blob's copy
  // (newerList is passed first).
  // dead is a map of id -> tombstone time: Infinity for plain tombstones
  // (always dead), a millisecond timestamp for intentional deletes of auto
  // entries. A record RECREATED after the delete (_m newer than the
  // tombstone) survives — that's how "set income again" revives a deposit.
  function unionById(newerList, olderList, dead) {
    var byId = {}, out = [];
    function consider(item) {
      if (!item || !item.id) return;
      var dts = dead[item.id];
      if (dts !== undefined && !((item._m || 0) > dts)) return;
      var cur = byId[item.id];
      if (!cur) { byId[item.id] = item; out.push(item); return; }
      if ((item._m || 0) > (cur._m || 0)) {
        out[out.indexOf(cur)] = item;
        byId[item.id] = item;
      }
    }
    (newerList || []).forEach(consider);
    (olderList || []).forEach(consider);
    return out;
  }
  function unionList(a, b) {
    var seen = {}, out = [];
    (a || []).concat(b || []).forEach(function (id) {
      if (!seen[id]) { seen[id] = 1; out.push(id); }
    });
    return out;
  }
  // local & remote are full data blobs (or null). Newer updatedAt wins for
  // scalar state; records union by id minus tombstones from EITHER side.
  function mergeData(local, remote) {
    if (!local) return remote;
    if (!remote) return local;
    var newer = (local.updatedAt || 0) >= (remote.updatedAt || 0) ? local : remote;
    // Settings-driven auto entries for the CURRENT month: a PLAIN tombstone
    // ("recinc-2026-07") is a stale wipe artifact — it must neither kill the
    // freshly-materialized deposit nor keep circulating between devices. Only
    // a TIMESTAMPED tombstone ("recinc-2026-07@<ms>", an intentional in-app
    // delete) is honored. Older months keep plain-tombstone behavior.
    var now = new Date();
    var CUR = now.getFullYear() + "-" + ("0" + (now.getMonth() + 1)).slice(-2);
    var staleIds = {};
    staleIds["recinc-" + CUR] = 1;
    staleIds["recsave-" + CUR] = 1;
    var dropStale = function (id) { return !staleIds[id]; };   // plain stale ids only
    var delTx = unionList(local.deleted && local.deleted.txns, remote.deleted && remote.deleted.txns)
      .filter(dropStale);
    var delIn = unionList(local.deleted && local.deleted.income, remote.deleted && remote.deleted.income)
      .filter(dropStale);
    // dead maps match by BASE id; value = tombstone time (Infinity when plain)
    var stamp = function (map, id) {
      var parts = id.split("@");
      var ts = parts.length > 1 ? (+parts[1] || Infinity) : Infinity;
      var base = parts[0];
      map[base] = Math.max(map[base] || 0, ts);
    };
    var deadTx = {}; delTx.forEach(function (id) { stamp(deadTx, id); });
    var deadIn = {}; delIn.forEach(function (id) { stamp(deadIn, id); });
    var older = newer === local ? remote : local;
    var merged = JSON.parse(JSON.stringify(newer));
    // NEWER side listed first: when the same id exists on both sides (an
    // edit), the more recently-updated device's copy wins — a stale device
    // can no longer revert another device's edit.
    merged.txns = unionById(newer.txns, older.txns, deadTx)
      .sort(function (a, b) { return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });
    merged.income = unionById(newer.income, older.income, deadIn)
      .sort(function (a, b) { return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });
    merged.deleted = { txns: delTx.slice(-1000), income: delIn.slice(-1000) };
    // The Monthly plan (settings + bills) carries its OWN clock, because the
    // blob-level updatedAt is bumped by automatic writes (materialized
    // deposits/bills) — a device with a stale plan must not clobber a newer
    // plan just because it opened the app more recently.
    var lts = local.settingsTs || 0, rts = remote.settingsTs || 0;
    if (lts !== rts) {
      var planSide = lts > rts ? local : remote;
      if (planSide.settings) merged.settings = JSON.parse(JSON.stringify(planSide.settings));
      if (planSide.bills !== undefined) merged.bills = JSON.parse(JSON.stringify(planSide.bills));
    }
    merged.settingsTs = Math.max(lts, rts);
    merged.updatedAt = Math.max(local.updatedAt || 0, remote.updatedAt || 0);
    return merged;
  }

  /* ---------------- crypto (WebCrypto, async) ---------------- */
  var subtle = (root.crypto && root.crypto.subtle) ? root.crypto.subtle : null;
  var enc = new TextEncoder(), dec = new TextDecoder();
  function b64(buf) {
    var bytes = new Uint8Array(buf), s = "";
    for (var i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
    return btoa(s);
  }
  function unb64(s) {
    var bin = atob(s), bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }
  function deriveKey(passphrase, salt) {
    return subtle.importKey("raw", enc.encode(passphrase), "PBKDF2", false, ["deriveKey"])
      .then(function (base) {
        return subtle.deriveKey(
          { name: "PBKDF2", salt: salt, iterations: 210000, hash: "SHA-256" },
          base, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
      });
  }
  function encryptJSON(obj, passphrase) {
    var salt = root.crypto.getRandomValues(new Uint8Array(16));
    var iv = root.crypto.getRandomValues(new Uint8Array(12));
    return deriveKey(passphrase, salt).then(function (key) {
      return subtle.encrypt({ name: "AES-GCM", iv: iv }, key, enc.encode(JSON.stringify(obj)));
    }).then(function (ct) {
      return { v: 1, kdf: "PBKDF2-SHA256-210k", salt: b64(salt), iv: b64(iv), ct: b64(ct) };
    });
  }
  function decryptJSON(payload, passphrase) {
    return deriveKey(passphrase, unb64(payload.salt)).then(function (key) {
      return subtle.decrypt({ name: "AES-GCM", iv: unb64(payload.iv) }, key, unb64(payload.ct));
    }).then(function (pt) { return JSON.parse(dec.decode(pt)); });
  }

  /* ---------------- GitHub transport ---------------- */
  var PATH = "budget.enc.json";
  function ghUrl(cfg) {
    return "https://api.github.com/repos/" + cfg.repo + "/contents/" + PATH;
  }
  function ghHeaders(cfg) {
    return {
      "Authorization": "Bearer " + cfg.token,
      "Accept": "application/vnd.github+json",
      "Content-Type": "application/json",
    };
  }
  // -> { payload|null, sha|null }; throws on auth/network problems
  function pull(cfg) {
    return fetch(ghUrl(cfg), { headers: ghHeaders(cfg) }).then(function (r) {
      if (r.status === 404) return { payload: null, sha: null };  // first sync ever
      if (!r.ok) throw new Error("GitHub said " + r.status + " — check repo name & token");
      return r.json().then(function (j) {
        var raw = atob((j.content || "").replace(/\n/g, ""));
        return { payload: JSON.parse(raw), sha: j.sha };
      });
    });
  }
  function push(cfg, payload, sha) {
    var body = {
      message: "sync " + new Date().toISOString(),
      content: btoa(JSON.stringify(payload)),
    };
    if (sha) body.sha = sha;
    return fetch(ghUrl(cfg), { method: "PUT", headers: ghHeaders(cfg), body: JSON.stringify(body) })
      .then(function (r) {
        if (r.status === 409 || r.status === 422) return { conflict: true };
        if (!r.ok) throw new Error("GitHub said " + r.status + " on save — check token permissions");
        return { conflict: false };
      });
  }

  /* ---------------- the sync cycle ---------------- */
  // pull -> decrypt -> merge with local -> encrypt -> push (retry once on
  // conflict). Returns { data, pushed } — data is what the app should use.
  function syncNow(cfg, localData, attempt) {
    return pull(cfg).then(function (got) {
      var remoteData = null;
      var decP = got.payload
        ? decryptJSON(got.payload, cfg.pass).catch(function () {
            throw new Error("Couldn't decrypt — is the passphrase the same on both devices?");
          })
        : Promise.resolve(null);
      return decP.then(function (rd) {
        remoteData = rd;
        var merged = mergeData(localData, remoteData);
        var same = remoteData && JSON.stringify(merged) === JSON.stringify(remoteData);
        if (same) return { data: merged, pushed: false };
        return encryptJSON(merged, cfg.pass).then(function (payload) {
          return push(cfg, payload, got.sha).then(function (res) {
            if (res.conflict) {
              if (attempt >= 1) throw new Error("Sync conflict — try again in a moment");
              return syncNow(cfg, merged, 1);   // someone else pushed; re-pull & merge
            }
            return { data: merged, pushed: true };
          });
        });
      });
    });
  }

  var api = { mergeData: mergeData, encryptJSON: encryptJSON, decryptJSON: decryptJSON,
    pull: pull, push: push, syncNow: syncNow, PATH: PATH };
  if (typeof module !== "undefined" && module.exports) module.exports = api;
  else root.BudgetSync = api;

<script>/* sync merge tests */
/* Merge-logic tests (pure, sync) — folded into the in-app self-check.
   Crypto roundtrip is async and verified separately (node + headless). */
(function (root) {
  "use strict";
  function runSyncTests(S) {
    var pass = 0, fail = 0, log = [];
    function ok(name, cond, detail) {
      if (cond) { pass++; log.push(["ok", name]); }
      else { fail++; log.push(["fail", name + (detail ? "  [" + detail + "]" : "")]); }
    }
    function eq(name, got, want) { ok(name, got === want, "got " + JSON.stringify(got) + " want " + JSON.stringify(want)); }

    var base = { settings: { liquidCushion: 100 }, categories: [], overrides: {}, merchantMap: {},
      sinkingFunds: [], deleted: { txns: [], income: [] } };
    function mk(over) { return Object.assign(JSON.parse(JSON.stringify(base)), over); }

    /* union by id: a txn added on each device survives on both */
    var a = mk({ updatedAt: 2, txns: [{ id: "t1", date: "2026-07-01", amount: 100 }], income: [] });
    var b = mk({ updatedAt: 1, txns: [{ id: "t2", date: "2026-07-02", amount: 200 }], income: [] });
    var m = S.mergeData(a, b);
    eq("merge unions txns from both devices", m.txns.length, 2);
    ok("merge keeps chronological order", m.txns[0].id === "t1" && m.txns[1].id === "t2");

    /* tombstones: a delete on one device sticks everywhere */
    var c = mk({ updatedAt: 3, txns: [], income: [], deleted: { txns: ["t1"], income: [] } });
    var d = mk({ updatedAt: 2, txns: [{ id: "t1", date: "2026-07-01", amount: 100 }], income: [] });
    var m2 = S.mergeData(c, d);
    eq("deleted txn does NOT resurrect from a stale device", m2.txns.length, 0);
    eq("tombstone carried forward", m2.deleted.txns[0], "t1");

    /* newer scalar state wins */
    var e = mk({ updatedAt: 10, settings: { liquidCushion: 999 }, txns: [], income: [] });
    var f = mk({ updatedAt: 5, settings: { liquidCushion: 111 }, txns: [], income: [] });
    eq("newer settings win", S.mergeData(e, f).settings.liquidCushion, 999);
    eq("order of args doesn't matter", S.mergeData(f, e).settings.liquidCushion, 999);

    /* null sides */
    ok("merge(local, null) = local", S.mergeData(e, null) === e);
    ok("merge(null, remote) = remote", S.mergeData(null, f) === f);

    /* duplicate ids never double */
    var g = mk({ updatedAt: 1, txns: [{ id: "x", date: "2026-07-01", amount: 5 }], income: [] });
    var h = mk({ updatedAt: 2, txns: [{ id: "x", date: "2026-07-01", amount: 5 }], income: [] });
    eq("same txn on both devices stays single", S.mergeData(g, h).txns.length, 1);

    /* an EDIT on the newer device must win over the stale copy — both ways */
    var ed1 = mk({ updatedAt: 9, txns: [{ id: "e", date: "2026-07-01", amount: 999 }], income: [] });
    var ed2 = mk({ updatedAt: 1, txns: [{ id: "e", date: "2026-07-01", amount: 111 }], income: [] });
    eq("edit wins when local is newer", S.mergeData(ed1, ed2).txns[0].amount, 999);
    eq("edit wins when REMOTE is newer (stale device can't revert)",
      S.mergeData(ed2, ed1).txns[0].amount, 999);

    /* per-record clock: a record edited at _m=100 beats a stale copy inside
       a blob that is newer overall (the device merely did something else later) */
    var pr1 = mk({ updatedAt: 1, txns: [{ id: "e", _m: 100, date: "2026-07-01", amount: 999 }], income: [] });
    var pr2 = mk({ updatedAt: 9, txns: [{ id: "e", _m: 5, date: "2026-07-01", amount: 111 }], income: [] });
    eq("record edit beats stale copy in a newer blob", S.mergeData(pr1, pr2).txns[0].amount, 999);
    eq("…in either argument order", S.mergeData(pr2, pr1).txns[0].amount, 999);

    /* income tombstones too */
    var i1 = mk({ updatedAt: 2, txns: [], income: [{ id: "i1", date: "2026-07-01", amount: 7 }] });
    var i2 = mk({ updatedAt: 3, txns: [], income: [], deleted: { txns: [], income: ["i1"] } });
    eq("deleted income stays deleted", S.mergeData(i1, i2).income.length, 0);

    var CUR = (function () { var d = new Date();
      return d.getFullYear() + "-" + ("0" + (d.getMonth() + 1)).slice(-2); })();
    var incId = "recinc-" + CUR;
    /* a PLAIN tombstone for this month's auto deposit is a stale wipe
       artifact: it must NOT kill the entry, and must be dropped */
    var s1 = mk({ updatedAt: 5, txns: [],
      income: [{ id: incId, date: CUR + "-01", amount: 500000, source: "Monthly income" }] });
    var s2 = mk({ updatedAt: 3, txns: [], income: [], deleted: { txns: [], income: [incId] } });
    var sm = S.mergeData(s1, s2);
    eq("stale plain tombstone can't kill this month's deposit", sm.income.length, 1);
    eq("stale plain tombstone is dropped from merged deletions",
      sm.deleted.income.indexOf(incId), -1);
    /* a TIMESTAMPED tombstone is an intentional delete: it kills the entry */
    var t1 = mk({ updatedAt: 5, txns: [],
      income: [{ id: incId, date: CUR + "-01", amount: 500000, source: "Monthly income" }] });
    var t2 = mk({ updatedAt: 6, txns: [], income: [],
      deleted: { txns: [], income: [incId + "@1752300000000"] } });
    eq("timestamped tombstone kills this month's deposit", S.mergeData(t1, t2).income.length, 0);
    /* plain tombstones still kill ordinary (non-auto) records */
    var n1 = mk({ updatedAt: 5, txns: [], income: [{ id: "dep1", date: CUR + "-02", amount: 100 }] });
    var n2 = mk({ updatedAt: 6, txns: [], income: [], deleted: { txns: [], income: ["dep1"] } });
    eq("plain tombstone still kills ordinary entries", S.mergeData(n1, n2).income.length, 0);
    /* past-month auto entries keep plain-tombstone behavior */
    var p1 = mk({ updatedAt: 5, txns: [],
      income: [{ id: "recinc-2026-01", date: "2026-01-01", amount: 100, source: "Monthly income" }] });
    var p2 = mk({ updatedAt: 6, txns: [], income: [], deleted: { txns: [], income: ["recinc-2026-01"] } });
    eq("past-month auto deposit: plain tombstone still respected",
      S.mergeData(p1, p2).income.length, 0);

    /* revive-after-delete: a deposit RECREATED after the tombstone's time
       (_m newer) survives the merge — deleted-then-set-income-again works */
    var r1 = mk({ updatedAt: 8, txns: [],
      income: [{ id: incId, _m: 2000, date: CUR + "-01", amount: 622100, source: "Monthly income" }] });
    var r2 = mk({ updatedAt: 6, txns: [], income: [],
      deleted: { txns: [], income: [incId + "@1000"] } });
    eq("recreated deposit (newer than delete) survives merge",
      S.mergeData(r1, r2).income.length, 1);
    /* …but a copy OLDER than the delete stays dead */
    var r3 = mk({ updatedAt: 8, txns: [],
      income: [{ id: incId, _m: 500, date: CUR + "-01", amount: 622100, source: "Monthly income" }] });
    eq("stale copy older than the delete stays dead",
      S.mergeData(r3, r2).income.length, 0);

    /* --- the Monthly plan syncs by its OWN clock (settingsTs) --- */
    /* blob A is "newer" overall (auto writes bump updatedAt) but its plan is
       older — blob B's plan must win anyway */
    var pa = mk({ updatedAt: 100, settingsTs: 50, txns: [], income: [],
      settings: { monthlyIncome: 574200, paycheck: { amount: 287121, schedule: "semimonthly" } },
      bills: [{ id: "bOld", name: "Old bill", cents: 1000 }] });
    var pb = mk({ updatedAt: 20, settingsTs: 60, txns: [], income: [],
      settings: { monthlyIncome: 622100, paycheck: { amount: 287121, schedule: "biweekly" } },
      bills: [{ id: "bNew", name: "New bill", cents: 2000 }] });
    var pm = S.mergeData(pa, pb);
    eq("newer PLAN wins over newer BLOB (income)", pm.settings.monthlyIncome, 622100);
    eq("newer PLAN wins over newer BLOB (schedule)", pm.settings.paycheck.schedule, "biweekly");
    eq("bills travel with the plan", pm.bills[0].id, "bNew");
    eq("…in either argument order", S.mergeData(pb, pa).settings.monthlyIncome, 622100);
    eq("merged plan clock is the max", pm.settingsTs, 60);
    /* equal plan clocks: newer blob's settings stand (back-compat) */
    var pc = mk({ updatedAt: 100, settingsTs: 0, txns: [], income: [],
      settings: { monthlyIncome: 111 } });
    var pd = mk({ updatedAt: 20, settingsTs: 0, txns: [], income: [],
      settings: { monthlyIncome: 222 } });
    eq("equal plan clocks fall back to newer blob", S.mergeData(pc, pd).settings.monthlyIncome, 111);

    return { pass: pass, fail: fail, log: log };

  else root.runSyncTests = runSyncTests;
