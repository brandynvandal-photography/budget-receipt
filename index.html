<script>/* receipt & screenshot parser */
/* =====================================================================
   RECEIPT / SCREENSHOT PARSER — pure functions, no DOM, no OCR here.
   Input: raw OCR text. Output: structured suggestion(s) for the user to
   CONFIRM (never auto-committed — correct beats clever in a money app).
   Handles two shapes:
     1. A paper receipt  -> one txn  { merchant, totalCents, dateISO }
     2. A bank-app screenshot (e.g. Chime category breakdown or txn list)
        -> many rows     [ { label, cents, kind } ]
   ===================================================================== */
(function (root) {
  "use strict";

  /* ---------- money tokens ----------
     $12.34 / 12.34 / 1,234.56 / -$12.34 / +$50.00 — require 2 decimals so
     phone numbers, card digits, and qty don't match. */
  var MONEY = /([+\-–]?)\s*\$?\s*(\d{1,3}(?:,\d{3})*|\d{1,6})\.(\d{2})(?!\d)/g;

  function moneyMatches(line) {
    var out = [], m;
    MONEY.lastIndex = 0;
    while ((m = MONEY.exec(line)) !== null) {
      var cents = parseInt(m[2].replace(/,/g, ""), 10) * 100 + parseInt(m[3], 10);
      var neg = m[1] === "-" || m[1] === "–";
      var pos = m[1] === "+";
      out.push({ cents: cents, neg: neg, pos: pos });
    }
    return out;
  }

  function cleanLines(text) {
    return String(text || "").split(/\r?\n/)
      .map(function (l) { return l.replace(/\s+/g, " ").trim(); })
      .filter(function (l) { return l.length > 0; });
  }

  /* ---------- date extraction ---------- */
  function pad(n) { return (n < 10 ? "0" : "") + n; }
  function validDate(y, mo, d) {
    return y >= 2000 && y <= 2100 && mo >= 1 && mo <= 12 && d >= 1 && d <= 31;
  }
  var MONTHS = { jan:1, feb:2, mar:3, apr:4, may:5, jun:6, jul:7, aug:8, sep:9, oct:10, nov:11, dec:12 };
  // returns ISODate or null. todayISO caps the future (OCR misreads).
  function findDate(text, todayISO) {
    var m;
    // 2026-07-10 / 2026/07/10
    m = text.match(/\b(20\d{2})[-\/](\d{1,2})[-\/](\d{1,2})\b/);
    if (m && validDate(+m[1], +m[2], +m[3])) return cap(m[1] + "-" + pad(+m[2]) + "-" + pad(+m[3]));
    // 07/10/2026 or 07/10/26 or 7-10-26
    m = text.match(/\b(\d{1,2})[\/\-](\d{1,2})[\/\-](20\d{2}|\d{2})\b/);
    if (m) {
      var y = m[3].length === 2 ? 2000 + (+m[3]) : +m[3];
      if (validDate(y, +m[1], +m[2])) return cap(y + "-" + pad(+m[1]) + "-" + pad(+m[2]));

    // letters+digits pair is often not a date ("PUMP 04").
    var re1 = /\b([A-Za-z]{3,9})\.?\s+(\d{1,2})(?:,?\s*(20\d{2}))?\b/g;
    while ((m = re1.exec(text)) !== null) {
      var mo = MONTHS[m[1].slice(0, 3).toLowerCase()];
      var yr = m[3] ? +m[3] : +todayISO.slice(0, 4);
      if (mo && validDate(yr, mo, +m[2])) {
        var iso1 = cap(yr + "-" + pad(mo) + "-" + pad(+m[2]));
        if (iso1) return iso1;
      }
    }
    var re2 = /\b(\d{1,2})\s+([A-Za-z]{3,9})\.?\s*(20\d{2})?\b/g;
    while ((m = re2.exec(text)) !== null) {
      var mo2 = MONTHS[m[2].slice(0, 3).toLowerCase()];
      var yr2 = m[3] ? +m[3] : +todayISO.slice(0, 4);
      if (mo2 && validDate(yr2, mo2, +m[1])) {
        var iso2 = cap(yr2 + "-" + pad(mo2) + "-" + pad(+m[1]));
        if (iso2) return iso2;
      }
    }
    return null;
    function cap(iso) { return iso > todayISO ? null : iso; }
  }

  /* ---------- merchant guess (top of a paper receipt) ---------- */
  function guessMerchant(lines) {
    for (var i = 0; i < Math.min(6, lines.length); i++) {
      var l = lines[i];
      var alpha = (l.match(/[A-Za-z]/g) || []).length;
      var digits = (l.match(/\d/g) || []).length;
      if (alpha >= 3 && alpha > digits * 2 && !/receipt|welcome|thank|survey|www\.|http/i.test(l)) {
        // title-case a SHOUTING header
        var name = l.replace(/[#*|_]+/g, "").trim();
        if (name === name.toUpperCase()) {
          name = name.toLowerCase().replace(/\b[a-z]/g, function (c) { return c.toUpperCase(); });
        }
        return name.slice(0, 40);
      }
    }
    return "";
  }

  /* ---------- single-receipt total ---------- */
  var TOTAL_LABEL = /\b(grand\s*total|amount\s*due|balance\s*due|total)\b/i;
  var NOT_TOTAL = /\bsub\s*-?\s*total|total\s*(savings|saved|discount|items?|qty|tax)|tender|change|cash\s*back\b/i;

  function findTotal(lines) {
    var labeled = [];
    for (var i = 0; i < lines.length; i++) {
      var l = lines[i];
      if (TOTAL_LABEL.test(l) && !NOT_TOTAL.test(l)) {
        var ms = moneyMatches(l);
        if (!ms.length && i + 1 < lines.length) ms = moneyMatches(lines[i + 1]); // total on next line
        if (ms.length) labeled.push(ms[ms.length - 1].cents);
      }
    }
    if (labeled.length) return { cents: Math.max.apply(null, labeled), labeled: true };
    // fallback: the largest money token anywhere (receipts rarely show a value above the total)
    var all = [];
    lines.forEach(function (l) { moneyMatches(l).forEach(function (t) { all.push(t.cents); }); });
    if (all.length) return { cents: Math.max.apply(null, all), labeled: false };
    return null;
  }

  /* ---------- list mode (bank screenshots: label + amount rows) ---------- */
  var ROW_EXCLUDE = /\b(available|balance|pending\s*balance|credit\s*limit|limit|rewards?|cash\s*back|round\s*-?\s*ups?|save\s*when|spending\s*account|checking|savings|total)\b/i;
  // income even without a "+" sign: payroll & deposit language
  var INCOME_HINT = /\b(direct\s*dep(osit)?|payroll|paycheck|pay\s*check|salary|deposit|dd\s*payment|transfer\s*(in|from)|zelle\s*from|venmo\s*from|payment\s*from)\b/i;
  // merchant refunds reduce the category's spend — they are NOT income (§8)
  var REFUND_HINT = /\b(refund(ed)?|return(ed)?|reversal|chargeback|credit\s*memo)\b/i;
  function classifyRow(label, pos) {
    if (REFUND_HINT.test(label)) return "refund";
    if (pos || INCOME_HINT.test(label)) return "income";
    return "spend";
  }

  function parseListRows(lines) {
    var rows = [];
    for (var i = 0; i < lines.length; i++) {
      var l = lines[i];
      var ms = moneyMatches(l);
      if (ms.length !== 1) continue;                    // one amount per row
      var label = l.replace(MONEY, " ").replace(/\s+/g, " ").replace(/[·•|>._-]+$/g, "").trim();
      MONEY.lastIndex = 0;
      if (label.length < 2) {
        // amount-only line: label probably on the previous line
        var prev = lines[i - 1];
        if (prev && !moneyMatches(prev).length && /[A-Za-z]{3}/.test(prev) && !ROW_EXCLUDE.test(prev)) {
          label = prev.replace(/[·•|>._-]+$/g, "").trim();
        }
      }
      if (label.length < 2) continue;
      if (ROW_EXCLUDE.test(label)) continue;
      if (!/[A-Za-z]{2}/.test(label)) continue;
      var t = ms[0];
      rows.push({
        label: label.slice(0, 40),
        cents: t.cents,
        kind: classifyRow(label, t.pos),
      });
    }
    return rows;
  }

  /* ---------- category guessing ---------- */
  // keyword -> preferred category id (matches the app's seed ids; falls back by name)
  var KEYWORDS = [
    [/fred\s*meyer|safeway|kroger|albertsons?|winco|costco|walmart|trader\s*joe|whole\s*foods|aldi|grocer|market|qfc|food\s*4\s*less|groceries/i, "gro", "Groceries"],
    [/shell|chevron|arco|exxon|mobil|texaco|76|circle\s*k|gas|fuel|les\s*schwab|jiffy\s*lube|autozone|o'?reilly|napa|firestone|discount\s*tire|car\s*wash|parking|toll|transport|uber|lyft/i, "trans", "Transportation"],
    [/restaurant|mcdonald|burger|taco|pizza|starbucks|dutch\s*bros|cafe|coffee|chipotle|subway|kfc|wendy|deli|brew|bar\s|grill|thai|pho|sushi|food\s*&?\s*drink|dining|doordash|grubhub|fast\s*food/i, "dine", "Food & drinks"],
    [/electric|energy|power|water|sewer|utility|utilities|internet|comcast|xfinity|spectrum|verizon|t-?mobile|at&?t|phone\s*bill/i, "util", "Utilities"],
    [/insurance|geico|progressive|state\s*farm|allstate|farmers/i, "ins", "Insurance"],
    [/rent|landlord|property\s*mgmt|apartments?/i, "rent", "Rent"],
    [/hotel|motel|airbnb|airline|alaska\s*air|delta|united|southwest|flight|camp|travel|vacation/i, "vac", "Vacation"],
  ];

  function normMerchant(s) {
    return String(s || "").toLowerCase().replace(/[^a-z0-9 ]/g, "").replace(/\s+/g, " ").trim().slice(0, 40);
  }

  // merchantMap (learned) wins over keywords. categories used to verify the id exists.
  function guessCategory(label, categories, merchantMap) {
    var key = normMerchant(label);
    if (!key) return null;
    var byId = {}; var byName = {};
    (categories || []).forEach(function (c) { byId[c.id] = c; byName[c.name.toLowerCase()] = c; });
    if (merchantMap) {
      // exact, then prefix/contains for OCR jitter
      if (merchantMap[key] && byId[merchantMap[key]]) return merchantMap[key];
      var keys = Object.keys(merchantMap);
      for (var i = 0; i < keys.length; i++) {
        var k = keys[i];
        if (k.length >= 4 && (key.indexOf(k) !== -1 || k.indexOf(key) !== -1) && byId[merchantMap[k]]) {
          return merchantMap[k];
        }
      }
    }
    for (var j = 0; j < KEYWORDS.length; j++) {
      var row = KEYWORDS[j];
      if (row[0].test(label)) {
        if (byId[row[1]]) return row[1];
        var byN = byName[row[2].toLowerCase()];
        if (byN) return byN.id;
      }
    }
    return null;
  }

  /* ---------- entry point ---------- */
  // returns { mode: "receipt"|"list"|"empty", receipt?, rows? }
  function parseCapture(text, todayISO) {
    var lines = cleanLines(text);
    if (!lines.length) return { mode: "empty" };
    var rows = parseListRows(lines);
    var total = findTotal(lines);
    var hasTotalLabel = lines.some(function (l) { return TOTAL_LABEL.test(l) && !NOT_TOTAL.test(l); });
    // A paper receipt has a labeled total; a bank screenshot is many rows without one.
    if (rows.length >= 3 && !hasTotalLabel) {
      return { mode: "list", rows: rows };
    }
    if (total) {
      return {
        mode: "receipt",
        receipt: {
          merchant: guessMerchant(lines),
          totalCents: total.cents,
          labeled: total.labeled,
          dateISO: findDate(lines.join(" \n"), todayISO) || todayISO,
        },
      };
    }
    if (rows.length) return { mode: "list", rows: rows };
    return { mode: "empty" };
  }

  var api = {
    parseCapture: parseCapture, parseListRows: parseListRows, findTotal: findTotal, classifyRow: classifyRow,
    findDate: findDate, guessMerchant: guessMerchant, guessCategory: guessCategory,
    normMerchant: normMerchant, cleanLines: cleanLines,
  };
  if (typeof module !== "undefined" && module.exports) module.exports = api;
  else root.BudgetReceipt = api;
})(typeof globalThis !== "undefined" ? globalThis : (typeof self !== "undefined" ? self : this));

</script>
<script>/* receipt parser tests */
/* Fixture tests for the receipt/screenshot parser. Runs in node and is
   folded into the in-app self-check. */
(function (root) {
  "use strict";
  function runReceiptTests(R, categories) {
    var pass = 0, fail = 0, log = [];
    function ok(name, cond, detail) {
      if (cond) { pass++; log.push(["ok", name]); }
      else { fail++; log.push(["fail", name + (detail ? "  [" + detail + "]" : "")]); }
    }
    function eq(name, got, want) { ok(name, got === want, "got " + JSON.stringify(got) + " want " + JSON.stringify(want)); }
    var TODAY = "2026-07-10";

    /* --- paper receipt: grocery --- */
    var grocery = [
      "FRED MEYER", "3805 SE Hawthorne Blvd", "Portland OR 97214", "(503) 555-0134",
      "GROCERY", "MILK 2% GAL 3.49", "EGGS LG DZ 4.29", "CHKN BRST 9.87",
      "SUBTOTAL 17.65", "TAX 0.00", "TOTAL 17.65",
      "VISA TEND 17.65", "CHANGE 0.00", "07/08/2026 14:22",
    ].join("\n");
    var g = R.parseCapture(grocery, TODAY);
    eq("grocery: mode", g.mode, "receipt");
    eq("grocery: total 17.65", g.receipt.totalCents, 1765);
    ok("grocery: total was labeled", g.receipt.labeled === true);
    eq("grocery: merchant", g.receipt.merchant, "Fred Meyer");
    eq("grocery: date", g.receipt.dateISO, "2026-07-08");
    eq("grocery: category", R.guessCategory(g.receipt.merchant, categories, {}), "gro");

    /* --- paper receipt: gas, total on next line, SHOUTY --- */
    var gas = [
      "SHELL OIL 57444", "PUMP 04 REGULAR", "GALLONS 11.203", "PRICE/G $4.199",
      "FUEL TOTAL", "$47.04", "Jul 2, 2026",
    ].join("\n");
    var s = R.parseCapture(gas, TODAY);
    eq("gas: mode", s.mode, "receipt");
    eq("gas: total next-line 47.04", s.receipt.totalCents, 4704);
    eq("gas: date月", s.receipt.dateISO, "2026-07-02");
    eq("gas: category", R.guessCategory("SHELL OIL 57444", categories, {}), "trans");

    /* --- restaurant: subtotal/tip must not win --- */
    var rest = [
      "PINE STATE BISCUITS", "Server: Ash", "2x Reggie 15.00", "Coffee 3.50",
      "Subtotal 18.50", "Tax 0.00", "Tip ____", "Total 18.50", "06/28/26",
    ].join("\n");
    var r = R.parseCapture(rest, TODAY);
    eq("restaurant: total not subtotal", r.receipt.totalCents, 1850);
    eq("restaurant: date 2-digit year", r.receipt.dateISO, "2026-06-28");
    eq("restaurant: category", R.guessCategory("Pine State Biscuits restaurant", categories, {}), "dine");

    /* --- learned merchant map beats keywords --- */
    var learned = { "pine state biscuits": "vac" };
    eq("merchantMap wins", R.guessCategory("PINE STATE BISCUITS", categories, learned), "vac");
    eq("merchantMap fuzzy (OCR jitter)", R.guessCategory("PINE STATE BISCUIT", categories, learned), "vac");

    /* --- Chime category-breakdown screenshot --- */
    var chime = [
      "9:41", "Chime", "Spending", "July",
      "Food & Drink $432.10", "Transportation $210.55", "Groceries $388.00",
      "Bills & Utilities $250.00", "Shopping $86.44",
      "Available balance $1,204.33",
    ].join("\n");
    var c = R.parseCapture(chime, TODAY);
    eq("chime: mode is list", c.mode, "list");
    eq("chime: 5 rows (balance excluded)", c.rows.length, 5);
    ok("chime: no balance row", c.rows.every(function (x) { return !/balance/i.test(x.label); }));
    eq("chime: food row cents", c.rows[0].cents, 43210);
    eq("chime: food row category", R.guessCategory(c.rows[0].label, categories, {}), "dine");
    eq("chime: transport category", R.guessCategory(c.rows[1].label, categories, {}), "trans");

    /* --- Chime transaction-list screenshot with signs --- */
    var chimeTx = [
      "Transactions", "Fred Meyer", "-$38.42", "Shell", "-$52.10",
      "Direct Deposit ACME LLC", "+$1,250.00", "Dutch Bros", "-$7.25",
    ].join("\n");
    var ct = R.parseCapture(chimeTx, TODAY);
    eq("chimeTx: mode", ct.mode, "list");
    eq("chimeTx: 4 rows", ct.rows.length, 4);
    var dep = ct.rows.filter(function (x) { return x.kind === "income"; });
    eq("chimeTx: deposit detected as income", dep.length, 1);
    eq("chimeTx: deposit cents", dep[0].cents, 125000);
    eq("chimeTx: merchant label carried from prev line", ct.rows[0].label, "Fred Meyer");

    /* --- income & refund detection without a "+" sign --- */
    var payroll = R.parseCapture(
      "Transactions\nPayroll ACME LLC\n$1,250.00\nFred Meyer\n-$38.42\nAmazon Refund\n$21.99\nMobile Check Deposit\n$300.00", TODAY);
    eq("payroll (no plus) => income", payroll.rows[0].kind, "income");
    eq("plain spend stays spend", payroll.rows[1].kind, "spend");
    eq("refund detected as refund (reduces spend, not income)", payroll.rows[2].kind, "refund");
    eq("check deposit => income", payroll.rows[3].kind, "income");
    eq("classifyRow spend default", R.classifyRow("Chevron", false), "spend");
    eq("classifyRow + sign wins", R.classifyRow("Something", true), "income");

    /* --- garbage in, empty out (no NaN, no crash) --- */
    eq("empty text", R.parseCapture("", TODAY).mode, "empty");
    eq("no-money text", R.parseCapture("hello world\nno numbers here", TODAY).mode, "empty");
    ok("phone number not money", R.parseCapture("CALL 503-555-0134 TODAY", TODAY).mode === "empty");

    /* --- future OCR-misread date falls back to today --- */
    var fut = R.parseCapture("STORE\nTOTAL 10.00\n12/25/2099", TODAY);
    eq("future date capped to today", fut.receipt.dateISO, TODAY);

    return { pass: pass, fail: fail, log: log };
  }
  if (typeof module !== "undefined" && module.exports) module.exports = { runReceiptTests: runReceiptTests };
  else root.runReceiptTests = runReceiptTests;
})(typeof globalThis !== "undefined" ? globalThis : (typeof self !== "undefined" ? self : this));

</script>
<script>/* in-browser test harness */
/* In-browser mirror of tests.js (§7). Uses the SAME BudgetCore that the
   app renders with, so a green panel means the shipped app is doing the
   right math. Returns { pass, fail, log } instead of exiting. */
(function (root) {
  "use strict";
  function runTests(C, seed) {
    var pass = 0, fail = 0, log = [];
    function ok(name, cond, detail) {
      if (cond) { pass++; log.push(["ok", name]); }
      else { fail++; log.push(["fail", name + (detail ? "  [" + detail + "]" : "")]); }
    }
    function eq(name, got, want) { ok(name, got === want, "got " + got + " want " + want); }

    var txns = seed.txns, income = seed.income, cats = seed.categories;
    var allMonths = C.monthsWithData(income, txns);

    Object.keys(seed.expected.nets).forEach(function (m) {
      eq("net " + m + " = " + C.fmt(seed.expected.nets[m]),
        C.netForMonth(income, txns, m), seed.expected.nets[m]);
    });
    eq("May flagged red", C.monthIsRed(income, txns, "2026-05"), true);
    eq("June flagged red", C.monthIsRed(income, txns, "2026-06"), true);
    eq("Mar not red", C.monthIsRed(income, txns, "2026-03"), false);
    eq("Apr not red", C.monthIsRed(income, txns, "2026-04"), false);

    allMonths.forEach(function (m) {
      var viaCats = cats.reduce(function (s, cat) { return s + C.spentForEnvelope(txns, m, cat.id); }, 0)
        + C.spentForEnvelope(txns, m, null);
      eq("spend reconciles " + m, viaCats, C.monthSpend(txns, m));
    });

    ok("refund reduces Utilities spend (Jun)",
      C.spentForEnvelope(txns, "2026-06", "util") === seed.expected.utilJuneSpend,
      "got " + C.spentForEnvelope(txns, "2026-06", "util"));

    var deposits = allMonths.map(function (m) { return { month: m, cents: C.monthIncome(income, m) }; });
    var bl = C.baselineIncome(deposits, "DEFAULT");
    eq("baseline safe-to-budget = " + C.fmt(seed.expected.baselineSafe), bl.value, seed.expected.baselineSafe);
    ok("baseline = conservative of avg3 / trailing-low", bl.value === Math.min(bl.avg3, bl.low));

    var burn = C.coreMonthlyBurn(txns, cats, allMonths, "2026-06");
    var rw = C.runwayMonths(seed.settings.liquidCushion, burn);
    ok("runway is a real alarm (< 1 month)", rw > 0 && rw < 1, "runway=" + rw.toFixed(3));

    /* safety net: total-spend burn, earnings-aware, goal-aware (less lenient) */
    var sb = C.spendBurn(txns, cats, allMonths, "2026-06");
    ok("spendBurn counts more than needs-only burn", sb >= burn, "spendBurn=" + sb + " needBurn=" + burn);
    ok("plenty of cushion, healthy income => generous runway",
      C.safetyNetMonths(C.c(12000), C.c(2000), C.c(3000), 3) > 5.5);
    ok("outspending income trims the runway",
      C.safetyNetMonths(C.c(6000), C.c(3000), C.c(1500), 0) < C.safetyNetMonths(C.c(6000), C.c(3000), C.c(3000), 0));
    eq("no spend => infinite when there's a cushion",
      C.safetyNetMonths(C.c(5000), 0, C.c(2000), 3), Infinity);
    ok("a bigger goal reads stricter below target",
      C.safetyNetMonths(C.c(4000), C.c(2000), C.c(2500), 6) < C.safetyNetMonths(C.c(4000), C.c(2000), C.c(2500), 1));

    /* payday: next check on/after today, days until */
    eq("biweekly payday steps to the next cycle",
      C.nextPayday("2026-07-03", "biweekly", "2026-07-14"), "2026-07-17");
    eq("payday today counts as today",
      C.nextPayday("2026-07-14", "weekly", "2026-07-14"), "2026-07-14");
    eq("monthly payday keeps the day-of-month",
      C.nextPayday("2026-06-25", "monthly", "2026-07-14"), "2026-07-25");
    eq("days until a future payday", C.daysUntil("2026-07-17", "2026-07-14"), 3);
    eq("days until floors at zero for past dates", C.daysUntil("2026-07-01", "2026-07-14"), 0);
    /* balance floor: purchase that dips under the floor is RED/bank */
    eq("dropping under the balance floor => RED/bank",
      C.simpleVerdict(C.c(300), C.c(2000), C.c(1500), C.c(40), 1, { bank: C.c(500), floor: C.c(250) }).reason, "bank");
    ok("staying above the floor is fine",
      C.simpleVerdict(C.c(100), C.c(2000), C.c(1500), C.c(40), 1, { bank: C.c(500), floor: C.c(250) }).reason !== "bank");

    eq("projector guards daysElapsed==0", C.projectSpend(50000, 0, 30), 0);
    eq("projector pace correct", C.projectSpend(30000, 10, 30), 90000);

    var weights = {};
    var months3 = C.trailingMonths(allMonths, "2026-06", 3);
    cats.forEach(function (cat) {
      weights[cat.id] = Math.round(months3.reduce(function (s, m) {
        return s + C.spentForEnvelope(txns, m, cat.id);
      }, 0) / months3.length);
    });
    var alloc = C.allocate(bl.value, { need: 0.55, want: 0.25, save: 0.20 }, cats, weights);
    var allocSum = Object.keys(alloc).reduce(function (s, k) { return s + alloc[k]; }, 0);
    eq("allocator sums EXACTLY to baseline", allocSum, bl.value);
    ok("allocator all non-negative", Object.keys(alloc).every(function (k) { return alloc[k] >= 0; }));

    var clean = true;
    for (var i = 0; i < 100; i++) {
      var pool = Math.floor(Math.random() * 2000000);
      var n = 1 + Math.floor(Math.random() * 8), items = [];
      for (var j = 0; j < n; j++) items.push({ id: "x" + j, weight: 1 + Math.floor(Math.random() * 100) });
      var out = C.splitPool(pool, items);
      if (Object.keys(out).reduce(function (s, k) { return s + out[k]; }, 0) !== pool) clean = false;
    }
    ok("100 random splits conserve every penny", clean);

    var target = seed.settings.targetRunway;
    ok("affordable buy => not RED",
      C.canAfford(C.c(20), C.c(480), C.c(200), C.c(50000), C.c(1000), target).verdict !== "RED");
    eq("over-envelope buy => RED",
      C.canAfford(C.c(9999), C.c(480), C.c(200), seed.settings.liquidCushion, burn, target).verdict, "RED");
    eq("in-envelope buy under thin runway => AMBER (not red-out)",
      C.canAfford(C.c(40), C.c(866), C.c(480), seed.settings.liquidCushion, burn, target).verdict, "AMBER");
    eq("buy that crosses runway target => RED",
      C.canAfford(C.c(2000), C.c(200000), 0, C.c(13000), C.c(4000), 3).verdict, "RED");

    /* month-end projection: only variable spend gets paced */
    eq("projection paces variable spend", C.projectMonthEnd(C.c(1300), C.c(120), 12, 31),
      C.c(1300) - Math.round((C.c(120) / 12) * 19));
    eq("projection day 0 guard", C.projectMonthEnd(C.c(500), C.c(100), 0, 31), C.c(500));

    /* simple verdict: month + pace + per-day */
    eq("plenty left, on pace => GREEN",
      C.simpleVerdict(C.c(50), C.c(1000), C.c(800), C.c(40)).verdict, "GREEN");
    eq("more than left => RED/left",
      C.simpleVerdict(C.c(1200), C.c(1000), C.c(800), C.c(40)).reason, "left");
    eq("purchase tips projection negative => RED/pace",
      C.simpleVerdict(C.c(300), C.c(1000), C.c(200), C.c(40)).reason, "pace");
    eq("month already trending red => AMBER/trend not red-out",
      C.simpleVerdict(C.c(50), C.c(1000), C.c(-200), C.c(40)).reason, "trend");
    eq("eats most of what's left => AMBER/mostleft",
      C.simpleVerdict(C.c(900), C.c(1000), C.c(900), C.c(40)).reason, "mostleft");
    eq("costs > 3 days of budget => AMBER/bigday",
      C.simpleVerdict(C.c(150), C.c(1000), C.c(800), C.c(40)).reason, "bigday");
    eq("no pace data (past month) still works",
      C.simpleVerdict(C.c(50), C.c(1000), null, null).verdict, "GREEN");

    /* category leniency: essentials get more slack on soft warnings */
    eq("discretionary big-day warns (neutral leniency)",
      C.simpleVerdict(C.c(150), C.c(1000), C.c(800), C.c(40), 1).reason, "bigday");
    eq("same buy as food is fine (2x leniency)",
      C.simpleVerdict(C.c(150), C.c(1000), C.c(800), C.c(40), 2).verdict, "GREEN");
    eq("emergency clears an amber that fun would trip",
      C.simpleVerdict(C.c(150), C.c(1000), C.c(800), C.c(40), 3).verdict, "GREEN");
    eq("big fun buy vs bank => AMBER/want (600 on 1500)",
      C.simpleVerdict(C.c(600), C.c(3000), C.c(2500), C.c(80), 0.7, { bank: C.c(1500), floor: 0 }).reason, "want");
    eq("modest fun buy vs bank is not a want (100 on 1500)",
      C.simpleVerdict(C.c(100), C.c(3000), C.c(2500), C.c(80), 0.7, { bank: C.c(1500), floor: 0 }).reason !== "want", true);
    eq("fun trips the want nudge at 400 on 1500",
